[platformio]
default_envs = esp32

[env:esp32]
; 釘精確 platform 版：浮動 platform 會讓 pio 靜默升級 → 編出行為可能不同的 binary，
; 但 fw_hash 只蓋源碼+此 ini（不含 toolchain）→ /api/firmware 會誤判「match」。釘版後
; platformio.ini 本身在 fw_hash EXTRA_FILES 內，未來升級自動改 srcHash → match/stale 恢復誠實。
platform = espressif32@6.13.0
board = esp32dev
framework = arduino
monitor_speed = 460800
; 編譯前 pre-hook：
;  fw_stamp.py — 烤入韌體源碼身分 → src/fw_identity.h（FW_SRC_HASH/FW_GIT_REV/...）。
;    單一演算法 sysid/fw_hash.js；server.js 同模組重算 tree hash 比對「燒錄 vs 最新」。
;  ota_pass.py — 從 gitignored sysid/config/secrets.json 注入 -DOTA_PASSWORD（+ espota --auth）；
;    無檔則 OTA 開放（向後相容）。密碼不入 git。
extra_scripts =
    pre:sysid/fw_stamp.py
    pre:sysid/ota_pass.py
    post:sysid/ota_upload_auth.py
; CAN 後端：TWAI + SN65HVD230(VP230)，TX=21 RX=22（2026-07-02 起現役；6/6 唯讀掃描實機驗證）
build_flags = -DUSE_TWAI_CAN
; twai_probe.cpp 是獨立帶機探測（自帶 setup/loop），主韌體排除之
build_src_filter = +<*> -<twai_probe.cpp>
; mcp2515 lib 保留給 fallback env（TWAI 路徑不 include 故不編不鏈）
lib_deps =
    autowp/autowp-mcp2515@1.3.1

; ── MCP2515(SPI) 回退 env（退役備援）：硬體換回 MCP2515+TJA1050 時
;    pio run -e esp32_mcp2515 -t upload 即回舊路徑，上層碼零改動 ──
[env:esp32_mcp2515]
extends = env:esp32
build_flags =

; ── VP230/TWAI 帶機探測（獨立、唯讀、不覆蓋主韌體邏輯）──
; 只編 twai_probe.cpp（-<*> 排除 main 等），不帶 mcp2515 lib、不跑 fw/ota hook。
; 燒： pio run -e twai_probe -t upload  ·  監看： pio device monitor -e twai_probe -b 460800
; 測完還原主韌體： npm run upload
[env:twai_probe]
platform = espressif32@6.13.0
board = esp32dev
framework = arduino
monitor_speed = 460800
build_src_filter = -<*> +<twai_probe.cpp>

[env:esp32_ota]
extends = env:esp32
upload_protocol = espota
upload_port = stewart.local
; --auth=<密碼> + -I <host_ip> 由 post-hook ota_upload_auth.py 動態注入 UPLOADERFLAGS
; （不硬編、不入 git）。secrets.json 缺 otaPassword 時不帶 --auth，對應開放（未上鎖）韌體。
