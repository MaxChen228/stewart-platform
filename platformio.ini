[platformio]
default_envs = esp32

[env:esp32]
; 釘精確 platform 版：浮動 platform 會讓 pio 靜默升級 → 編出行為可能不同的 binary，
; 但 fw_hash 只蓋源碼+此 ini（不含 toolchain）→ /api/firmware 會誤判「match」。釘版後
; platformio.ini 本身在 fw_hash EXTRA_FILES 內，未來升級自動改 srcHash → match/stale 恢復誠實。
platform = espressif32@6.13.0
board = esp32dev
framework = arduino
monitor_speed = 460800
; 編譯前烤入韌體源碼身分 → src/fw_identity.h（FW_SRC_HASH/FW_GIT_REV/...）。
; 單一演算法 sysid/fw_hash.js；server.js 同模組重算 tree hash 比對「燒錄 vs 最新」。
extra_scripts = pre:sysid/fw_stamp.py
lib_deps =
    autowp/autowp-mcp2515@1.3.1

[env:esp32_ota]
extends = env:esp32
upload_protocol = espota
upload_port = stewart.local
