<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stewart Platform Scope</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #ccc; font-family: 'SF Mono', 'Consolas', monospace; font-size: 13px; overflow-x: hidden; }

#toolbar {
  display: flex; align-items: center; gap: 12px; padding: 8px 16px;
  background: #151515; border-bottom: 1px solid #333;
  flex-wrap: wrap;
}
#toolbar .group { display: flex; align-items: center; gap: 6px; }
#toolbar label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
#toolbar button {
  background: #222; color: #ccc; border: 1px solid #444; border-radius: 4px;
  padding: 4px 10px; cursor: pointer; font-family: inherit; font-size: 12px;
}
#toolbar button:hover { background: #333; }
#toolbar button.active { background: #2a5a2a; border-color: #4a4; color: #8f8; }
#toolbar select, #toolbar input {
  background: #1a1a1a; color: #ccc; border: 1px solid #444; border-radius: 4px;
  padding: 3px 6px; font-family: inherit; font-size: 12px;
}
.status { width: 8px; height: 8px; border-radius: 50%; background: #555; flex-shrink: 0; }
.status.connected { background: #4a4; }
.spacer { flex: 1; }
#stats { color: #666; font-size: 11px; }
#view-pos { color: #e67e22; font-size: 11px; font-weight: bold; }

#charts { display: flex; flex-direction: column; height: calc(100vh - 74px); }
.chart-row { display: flex; flex: 1; min-height: 0; }
.chart-wrap { flex: 1; position: relative; min-width: 0; border-bottom: 1px solid #222; }
.chart-wrap.phase { flex: 0 0 280px; border-left: 1px solid #222; }
.chart-label {
  position: absolute; top: 4px; left: 8px; z-index: 1;
  font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px;
  pointer-events: none;
}
.chart-label .val { color: #aaa; }
canvas { display: block; width: 100%; height: 100%; }

body.paused .chart-wrap:not(.phase) canvas { cursor: grab; }
body.dragging .chart-wrap:not(.phase) canvas { cursor: grabbing; }

#legend {
  display: flex; gap: 12px; padding: 0 16px; align-items: center;
}
.leg-item { display: flex; align-items: center; gap: 4px; cursor: pointer; opacity: 0.9; }
.leg-item.hidden { opacity: 0.3; }
.leg-dot { width: 10px; height: 10px; border-radius: 2px; }

#scrubber {
  height: 18px; background: #111; border-top: 1px solid #222;
  padding: 5px 16px; display: none;
}
#scrub-track {
  height: 8px; background: #1a1a1a; border-radius: 4px;
  position: relative; cursor: pointer;
}
#scrub-thumb {
  height: 100%; background: #555; border-radius: 4px;
  position: absolute; min-width: 6px; transition: background 0.15s;
}
#scrub-thumb:hover { background: #777; }

#cmd-bar {
  display: flex; gap: 8px; padding: 6px 16px; background: #111; border-top: 1px solid #333;
}
#cmd-bar input {
  flex: 1; background: #0a0a0a; color: #eee; border: 1px solid #333; border-radius: 4px;
  padding: 4px 8px; font-family: inherit; font-size: 13px;
}
#cmd-bar button { white-space: nowrap; }
</style>
</head>
<body>

<div id="toolbar">
  <div class="status" id="ws-status"></div>
  <div class="group">
    <label>Time</label>
    <button data-tw="100" title="2s">2s</button>
    <button data-tw="250" title="5s" class="active">5s</button>
    <button data-tw="500" title="10s">10s</button>
    <button data-tw="1500" title="30s">30s</button>
  </div>
  <div class="group" id="legend"></div>
  <div class="spacer"></div>
  <span id="view-pos"></span>
  <div class="group">
    <button id="btn-pause">⏸ Pause</button>
    <button id="btn-clear">Clear</button>
    <button id="btn-csv">CSV</button>
  </div>
  <span id="stats"></span>
</div>

<div id="charts">
  <div class="chart-row" style="flex:2">
    <div class="chart-wrap" id="cw-angles">
      <div class="chart-label">Angles (°) <span class="val" id="lbl-angles"></span></div>
      <canvas id="c-angles"></canvas>
    </div>
    <div class="chart-wrap phase" id="cw-phase">
      <div class="chart-label">Phase Portrait <span class="val" id="lbl-phase"></span></div>
      <canvas id="c-phase"></canvas>
    </div>
  </div>
  <div class="chart-row" style="flex:1.5">
    <div class="chart-wrap">
      <div class="chart-label">Error: target − actual (°) <span class="val" id="lbl-errors"></span></div>
      <canvas id="c-errors"></canvas>
    </div>
  </div>
  <div class="chart-row" style="flex:1">
    <div class="chart-wrap">
      <div class="chart-label">Gain / Kinetic <span class="val" id="lbl-gain"></span></div>
      <canvas id="c-gain"></canvas>
    </div>
  </div>
</div>

<div id="scrubber">
  <div id="scrub-track">
    <div id="scrub-thumb"></div>
  </div>
</div>

<div id="cmd-bar">
  <input id="cmd-input" placeholder="Send command (e.g. V 5 2, K 80 0 400 320, M 3, P 0 0 150 0 0 0)" />
  <button id="btn-send">Send</button>
</div>

<script>
// ===== Config =====
const COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6'];
const NAMES = ['M1','M2','M3','M4','M5','M6'];
const MAX_BUF = 3000;
const DPR = window.devicePixelRatio || 1;

// ===== State =====
let ws = null;
let paused = false;
let timeWindow = 250;
let selectedMotor = 0;
let motorVisible = [true,true,true,true,true,true];
let sampleCount = 0;
let viewOffset = 0; // samples from end (0=latest)

const buf = {
  a: Array.from({length:6}, () => []),
  tgt: Array.from({length:6}, () => []),
  adj: Array.from({length:6}, () => []),
  vel: Array.from({length:6}, () => []),
  g: [],
  kinetic: [],
  ts: [],
};

// ===== View range =====
function vEnd() { return Math.max(0, buf.a[0].length - viewOffset); }
function vStart() { return Math.max(0, vEnd() - timeWindow); }

// ===== WebSocket =====
function connectWS() {
  const loc = window.location;
  const wsUrl = `ws://${loc.hostname}:${loc.port || 3000}`;
  ws = new WebSocket(wsUrl);
  ws.onopen = () => document.getElementById('ws-status').classList.add('connected');
  ws.onclose = () => {
    document.getElementById('ws-status').classList.remove('connected');
    setTimeout(connectWS, 2000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = (ev) => {
    if (paused) return;
    try { onData(JSON.parse(ev.data)); } catch(e) {}
  };
}

function onData(d) {
  if (!d.a || d.a.length !== 6) return;
  const now = performance.now();
  sampleCount++;

  for (let i = 0; i < 6; i++) {
    const aArr = buf.a[i], vArr = buf.vel[i];
    const prev = aArr.length > 0 ? aArr[aArr.length - 1] : d.a[i];
    aArr.push(d.a[i]);
    vArr.push((d.a[i] - prev) / 0.02);

    if (d.tgt) buf.tgt[i].push(d.tgt[i]);
    else buf.tgt[i].push(null);

    if (d.adj) buf.adj[i].push(d.adj[i]);
    else buf.adj[i].push(null);

    if (aArr.length > MAX_BUF) {
      aArr.shift(); vArr.shift();
      buf.tgt[i].shift(); buf.adj[i].shift();
    }
  }

  buf.g.push(d.g != null ? d.g : null);
  let kin = 0;
  for (let i = 0; i < 6; i++) {
    const aArr = buf.a[i];
    if (aArr.length >= 2) {
      const delta = aArr[aArr.length-1] - aArr[aArr.length-2];
      kin += delta * delta;
    }
  }
  buf.kinetic.push(kin);
  buf.ts.push(now);

  if (buf.g.length > MAX_BUF) { buf.g.shift(); buf.kinetic.shift(); buf.ts.shift(); }
}

function sendCmd(cmd) {
  if (ws && ws.readyState === 1) ws.send(cmd);
}

// ===== Canvas Helpers =====
function setupCanvas(canvas) {
  const rect = canvas.parentElement.getBoundingClientRect();
  const w = Math.floor(rect.width);
  const h = Math.floor(rect.height);
  canvas.width = w * DPR;
  canvas.height = h * DPR;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);
  return { ctx, w, h };
}

function autoRange(arrays, vs, ve) {
  let min = Infinity, max = -Infinity;
  for (const arr of arrays) {
    const s = Math.max(0, Math.min(vs, arr.length));
    const e = Math.min(ve, arr.length);
    for (let i = s; i < e; i++) {
      if (arr[i] != null) {
        if (arr[i] < min) min = arr[i];
        if (arr[i] > max) max = arr[i];
      }
    }
  }
  if (min === Infinity) { min = 0; max = 1; }
  const pad = Math.max((max - min) * 0.1, 0.5);
  return { min: min - pad, max: max + pad };
}

function drawGrid(ctx, w, h, yMin, yMax, tw) {
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1;
  const ySteps = 4;
  const yRange = yMax - yMin;
  for (let i = 0; i <= ySteps; i++) {
    const y = h - (i / ySteps) * h;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    const val = yMin + (i / ySteps) * yRange;
    ctx.fillStyle = '#444';
    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(1), w - 4, y - 2);
  }
  if (yMin < 0 && yMax > 0) {
    const y0 = h - (-yMin / yRange) * h;
    ctx.strokeStyle = '#333';
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(0, y0); ctx.lineTo(w, y0); ctx.stroke();
    ctx.setLineDash([]);
  }
  ctx.fillStyle = '#333';
  ctx.textAlign = 'center';
  const secPerSample = 0.02;
  const totalSec = tw * secPerSample;
  const offsetSec = viewOffset * secPerSample;
  const ticks = [1, 2, 5, 10, 15, 30];
  let step = ticks.find(t => totalSec / t <= 6) || 10;
  for (let s = step; s < totalSec + step; s += step) {
    const x = w - ((s - offsetSec % step) / secPerSample / tw) * w;
    const label = s + offsetSec - (offsetSec % step);
    if (x < 30 || x > w - 10) continue;
    ctx.fillText(`-${label.toFixed(0)}s`, x, h - 2);
  }
}

function drawTrace(ctx, arr, w, h, yMin, yMax, color, vs, ve, lineWidth) {
  const count = ve - vs;
  if (count < 2) return;
  const yRange = yMax - yMin;
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth || 1.5;
  ctx.beginPath();
  let first = true;
  for (let i = vs; i < ve && i < arr.length; i++) {
    if (arr[i] == null) { first = true; continue; }
    const x = ((i - vs) / (count - 1)) * w;
    const y = h - ((arr[i] - yMin) / yRange) * h;
    if (first) { ctx.moveTo(x, y); first = false; }
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
}

// ===== Draw Functions =====
function drawAngles() {
  const canvas = document.getElementById('c-angles');
  const { ctx, w, h } = setupCanvas(canvas);
  ctx.clearRect(0, 0, w, h);

  const vs = vStart(), ve = vEnd();
  const visible = [];
  for (let i = 0; i < 6; i++) if (motorVisible[i]) visible.push(buf.a[i]);
  const range = autoRange(visible, vs, ve);
  drawGrid(ctx, w, h, range.min, range.max, ve - vs);

  for (let i = 0; i < 6; i++) {
    if (!motorVisible[i]) continue;
    if (buf.tgt[i].length > 0) {
      ctx.setLineDash([3, 3]);
      ctx.globalAlpha = 0.3;
      drawTrace(ctx, buf.tgt[i], w, h, range.min, range.max, COLORS[i], vs, ve, 1);
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
    }
    drawTrace(ctx, buf.a[i], w, h, range.min, range.max, COLORS[i], vs, ve, 1.5);
  }

  const idx = Math.min(ve - 1, buf.a[0].length - 1);
  const vals = [];
  for (let i = 0; i < 6; i++) {
    if (!motorVisible[i]) continue;
    if (idx >= 0 && idx < buf.a[i].length) vals.push(`${NAMES[i]}:${buf.a[i][idx].toFixed(1)}°`);
  }
  document.getElementById('lbl-angles').textContent = vals.join('  ');
}

function drawErrors() {
  const canvas = document.getElementById('c-errors');
  const { ctx, w, h } = setupCanvas(canvas);
  ctx.clearRect(0, 0, w, h);

  const vs = vStart(), ve = vEnd();
  const errors = [];
  for (let i = 0; i < 6; i++) {
    if (!motorVisible[i]) continue;
    const err = [];
    for (let j = vs; j < ve && j < buf.a[i].length; j++) {
      if (buf.tgt[i][j] != null) err.push(buf.tgt[i][j] - buf.a[i][j]);
      else err.push(null);
    }
    errors.push({ idx: i, data: err });
  }

  const range = autoRange(errors.map(e => e.data), 0, errors[0] ? errors[0].data.length : 0);
  const tw = errors[0] ? errors[0].data.length : timeWindow;
  drawGrid(ctx, w, h, range.min, range.max, tw);

  for (const e of errors) {
    drawTrace(ctx, e.data, w, h, range.min, range.max, COLORS[e.idx], 0, e.data.length, 1.5);
  }

  let rms = 0, cnt = 0;
  for (const e of errors) {
    const last = e.data[e.data.length - 1];
    if (last != null) { rms += last * last; cnt++; }
  }
  rms = cnt > 0 ? Math.sqrt(rms / cnt) : 0;
  document.getElementById('lbl-errors').textContent = `RMS: ${rms.toFixed(2)}°`;
}

function drawGain() {
  const canvas = document.getElementById('c-gain');
  const { ctx, w, h } = setupCanvas(canvas);
  ctx.clearRect(0, 0, w, h);

  const vs = vStart(), ve = vEnd();
  const gRange = { min: 0, max: 1.1 };
  const kRange = autoRange([buf.kinetic], vs, ve);
  kRange.min = 0;
  drawGrid(ctx, w, h, gRange.min, gRange.max, ve - vs);

  // Kinetic filled area
  {
    const count = ve - vs;
    if (count > 1) {
      const kRng = kRange.max - kRange.min || 1;
      ctx.fillStyle = 'rgba(231, 76, 60, 0.15)';
      ctx.beginPath();
      ctx.moveTo(0, h);
      for (let i = vs; i < ve && i < buf.kinetic.length; i++) {
        const x = ((i - vs) / (count - 1)) * w;
        const y = h - ((buf.kinetic[i] - kRange.min) / kRng) * h;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(w, h);
      ctx.fill();
      ctx.strokeStyle = '#c0392b';
      ctx.lineWidth = 1;
      ctx.beginPath();
      let first = true;
      for (let i = vs; i < ve && i < buf.kinetic.length; i++) {
        const x = ((i - vs) / (count - 1)) * w;
        const y = h - ((buf.kinetic[i] - kRange.min) / kRng) * h;
        if (first) { ctx.moveTo(x, y); first = false; }
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  }

  drawTrace(ctx, buf.g, w, h, gRange.min, gRange.max, '#2ecc71', vs, ve, 2);

  ctx.fillStyle = '#c0392b';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  for (let i = 0; i <= 3; i++) {
    const val = kRange.min + (i / 3) * (kRange.max - kRange.min);
    const y = h - (i / 3) * h;
    ctx.fillText(`K:${val.toFixed(1)}`, 4, y - 2);
  }

  const idx = Math.min(ve - 1, buf.g.length - 1);
  const lastG = idx >= 0 ? buf.g[idx] : null;
  const lastK = idx >= 0 ? buf.kinetic[idx] : 0;
  document.getElementById('lbl-gain').textContent =
    `g=${lastG != null ? lastG.toFixed(3) : '—'}  kinetic=${(lastK||0).toFixed(2)}`;
}

function drawPhase() {
  const canvas = document.getElementById('c-phase');
  const { ctx, w, h } = setupCanvas(canvas);
  ctx.clearRect(0, 0, w, h);

  const mi = selectedMotor;
  const aArr = buf.a[mi];
  const vArr = buf.vel[mi];
  const tArr = buf.tgt[mi];
  const vs = vStart(), ve = vEnd();
  if (ve - vs < 2) return;

  const xs = [], ys = [];
  for (let i = vs; i < ve && i < aArr.length; i++) {
    if (tArr[i] != null) {
      xs.push(tArr[i] - aArr[i]);
    } else {
      xs.push(aArr[i] - (aArr[vs] || 90));
    }
    ys.push(vArr[i] || 0);
  }

  let xMax = 0.5, yMax = 10;
  for (let i = 0; i < xs.length; i++) {
    xMax = Math.max(xMax, Math.abs(xs[i]));
    yMax = Math.max(yMax, Math.abs(ys[i]));
  }
  xMax *= 1.2; yMax *= 1.2;

  const cx = w / 2, cy = h / 2;
  ctx.strokeStyle = '#333';
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(w, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle = '#555';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`err(°)`, cx, h - 2);
  ctx.fillText(`${(-xMax).toFixed(1)}`, 4, cy - 4);
  ctx.fillText(`${xMax.toFixed(1)}`, w - 4, cy - 4);
  ctx.save();
  ctx.translate(12, cy);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('vel(°/s)', 0, 0);
  ctx.restore();

  const count = xs.length;
  for (let i = 1; i < count; i++) {
    const alpha = 0.1 + 0.9 * (i / count);
    const x1 = cx + (xs[i-1] / xMax) * (w / 2);
    const y1 = cy - (ys[i-1] / yMax) * (h / 2);
    const x2 = cx + (xs[i] / xMax) * (w / 2);
    const y2 = cy - (ys[i] / yMax) * (h / 2);
    ctx.strokeStyle = COLORS[mi];
    ctx.globalAlpha = alpha;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  if (count > 0) {
    const lx = cx + (xs[count-1] / xMax) * (w / 2);
    const ly = cy - (ys[count-1] / yMax) * (h / 2);
    ctx.fillStyle = COLORS[mi];
    ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI * 2); ctx.fill();
  }

  document.getElementById('lbl-phase').textContent =
    `${NAMES[mi]}  spiral out=unstable`;
}

// ===== Scrubber =====
function updateScrubber() {
  const scrubber = document.getElementById('scrubber');
  const thumb = document.getElementById('scrub-thumb');
  if (!paused) { scrubber.style.display = 'none'; return; }
  scrubber.style.display = 'block';

  const total = buf.a[0].length;
  if (total <= timeWindow) {
    thumb.style.left = '0';
    thumb.style.width = '100%';
    return;
  }
  const track = document.getElementById('scrub-track');
  const trackW = track.getBoundingClientRect().width;
  const ratio = timeWindow / total;
  const thumbW = Math.max(6, ratio * trackW);
  const pos = ((total - viewOffset - timeWindow) / (total - timeWindow)) * (trackW - thumbW);
  thumb.style.width = thumbW + 'px';
  thumb.style.left = Math.max(0, pos) + 'px';
}

// ===== Render Loop =====
function render() {
  if (!paused) viewOffset = 0;
  drawAngles();
  drawErrors();
  drawGain();
  drawPhase();
  updateScrubber();

  const total = buf.a[0].length;
  document.getElementById('stats').textContent = `${sampleCount} samples | ${total} buffered`;

  const posEl = document.getElementById('view-pos');
  if (paused && viewOffset > 0) {
    posEl.textContent = `@ -${(viewOffset * 0.02).toFixed(1)}s`;
  } else {
    posEl.textContent = '';
  }

  requestAnimationFrame(render);
}

// ===== UI Setup =====
function initUI() {
  const legend = document.getElementById('legend');
  for (let i = 0; i < 6; i++) {
    const el = document.createElement('div');
    el.className = 'leg-item';
    el.innerHTML = `<div class="leg-dot" style="background:${COLORS[i]}"></div><span>${NAMES[i]}</span>`;
    el.addEventListener('click', () => {
      motorVisible[i] = !motorVisible[i];
      el.classList.toggle('hidden', !motorVisible[i]);
    });
    el.addEventListener('dblclick', (e) => {
      e.preventDefault();
      selectedMotor = i;
    });
    legend.appendChild(el);
  }

  document.querySelectorAll('[data-tw]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-tw]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      timeWindow = parseInt(btn.dataset.tw);
    });
  });

  const btnPause = document.getElementById('btn-pause');
  btnPause.addEventListener('click', () => {
    paused = !paused;
    btnPause.textContent = paused ? '▶ Resume' : '⏸ Pause';
    btnPause.classList.toggle('active', paused);
    document.body.classList.toggle('paused', paused);
    if (!paused) viewOffset = 0;
  });

  document.getElementById('btn-clear').addEventListener('click', () => {
    for (let i = 0; i < 6; i++) {
      buf.a[i].length = 0; buf.tgt[i].length = 0;
      buf.adj[i].length = 0; buf.vel[i].length = 0;
    }
    buf.g.length = 0; buf.kinetic.length = 0; buf.ts.length = 0;
    sampleCount = 0;
    viewOffset = 0;
  });

  document.getElementById('btn-csv').addEventListener('click', exportCSV);

  const cmdInput = document.getElementById('cmd-input');
  const btnSend = document.getElementById('btn-send');
  const doSend = () => {
    const cmd = cmdInput.value.trim();
    if (cmd) { sendCmd(cmd); cmdInput.value = ''; }
  };
  btnSend.addEventListener('click', doSend);
  cmdInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSend(); });

  document.addEventListener('keydown', (e) => {
    if (e.target === cmdInput) return;
    if (e.key === ' ') { e.preventDefault(); btnPause.click(); }
    if (e.key >= '1' && e.key <= '6') { selectedMotor = parseInt(e.key) - 1; }
    if (!paused) return;
    const step = e.shiftKey ? Math.round(timeWindow / 4) : 5;
    if (e.key === 'ArrowLeft') { viewOffset = Math.min(buf.a[0].length - timeWindow, viewOffset + step); e.preventDefault(); }
    if (e.key === 'ArrowRight') { viewOffset = Math.max(0, viewOffset - step); e.preventDefault(); }
    if (e.key === 'Home') { viewOffset = Math.max(0, buf.a[0].length - timeWindow); e.preventDefault(); }
    if (e.key === 'End') { viewOffset = 0; e.preventDefault(); }
  });

  initDragPan();
  initScrubberDrag();
}

// ===== Drag to Pan =====
function initDragPan() {
  const chartsEl = document.getElementById('charts');
  let drag = null;

  chartsEl.addEventListener('mousedown', (e) => {
    if (!paused) return;
    if (e.target.closest('.phase')) return;
    drag = { startX: e.clientX, startOffset: viewOffset };
    document.body.classList.add('dragging');
    e.preventDefault();
  });

  window.addEventListener('mousemove', (e) => {
    if (!drag) return;
    const chartW = document.getElementById('c-angles').parentElement.getBoundingClientRect().width;
    const samplesPerPx = timeWindow / chartW;
    const dx = e.clientX - drag.startX;
    const maxOffset = Math.max(0, buf.a[0].length - timeWindow);
    viewOffset = Math.max(0, Math.min(maxOffset, drag.startOffset + Math.round(dx * samplesPerPx)));
  });

  window.addEventListener('mouseup', () => {
    if (drag) { drag = null; document.body.classList.remove('dragging'); }
  });

  chartsEl.addEventListener('wheel', (e) => {
    if (!paused) return;
    if (e.target.closest('.phase')) return;
    e.preventDefault();
    const delta = Math.sign(e.deltaX || e.deltaY) * Math.max(1, Math.round(timeWindow * 0.05));
    const maxOffset = Math.max(0, buf.a[0].length - timeWindow);
    viewOffset = Math.max(0, Math.min(maxOffset, viewOffset + delta));
  }, { passive: false });
}

// ===== Scrubber Drag =====
function initScrubberDrag() {
  const track = document.getElementById('scrub-track');
  let dragging = false;

  function scrubTo(clientX) {
    const rect = track.getBoundingClientRect();
    const ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    const total = buf.a[0].length;
    const maxOffset = Math.max(0, total - timeWindow);
    viewOffset = Math.round(maxOffset * (1 - ratio));
  }

  track.addEventListener('mousedown', (e) => {
    dragging = true;
    scrubTo(e.clientX);
    e.preventDefault();
  });

  window.addEventListener('mousemove', (e) => {
    if (dragging) scrubTo(e.clientX);
  });

  window.addEventListener('mouseup', () => { dragging = false; });
}

function exportCSV() {
  const n = buf.a[0].length;
  if (n === 0) return;
  let csv = 'sample,a1,a2,a3,a4,a5,a6,tgt1,tgt2,tgt3,tgt4,tgt5,tgt6,v1,v2,v3,v4,v5,v6,gain,kinetic\n';
  for (let j = 0; j < n; j++) {
    const row = [j];
    for (let i = 0; i < 6; i++) row.push(buf.a[i][j]?.toFixed(3) ?? '');
    for (let i = 0; i < 6; i++) row.push(buf.tgt[i][j]?.toFixed(3) ?? '');
    for (let i = 0; i < 6; i++) row.push(buf.vel[i][j]?.toFixed(3) ?? '');
    row.push(buf.g[j]?.toFixed(4) ?? '');
    row.push(buf.kinetic[j]?.toFixed(4) ?? '');
    csv += row.join(',') + '\n';
  }
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `scope_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.csv`;
  a.click();
}

// ===== Start =====
initUI();
connectWS();
requestAnimationFrame(render);
</script>
