<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stewart Platform Scope</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #ccc; font-family: 'SF Mono', 'Consolas', monospace; font-size: 13px; overflow-x: hidden; }

#toolbar {
  display: flex; align-items: center; gap: 12px; padding: 8px 16px;
  background: #151515; border-bottom: 1px solid #333;
  flex-wrap: wrap;
}
#toolbar .group { display: flex; align-items: center; gap: 6px; }
#toolbar label { color: #888; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
#toolbar button {
  background: #222; color: #ccc; border: 1px solid #444; border-radius: 4px;
  padding: 4px 10px; cursor: pointer; font-family: inherit; font-size: 12px;
}
#toolbar button:hover { background: #333; }
#toolbar button.active { background: #2a5a2a; border-color: #4a4; color: #8f8; }
#toolbar select, #toolbar input {
  background: #1a1a1a; color: #ccc; border: 1px solid #444; border-radius: 4px;
  padding: 3px 6px; font-family: inherit; font-size: 12px;
}
.status { width: 8px; height: 8px; border-radius: 50%; background: #555; flex-shrink: 0; }
.status.connected { background: #4a4; }
.spacer { flex: 1; }
#stats { color: #666; font-size: 11px; }

#charts { display: flex; flex-direction: column; height: calc(100vh - 44px); }
.chart-row { display: flex; flex: 1; min-height: 0; }
.chart-wrap { flex: 1; position: relative; min-width: 0; border-bottom: 1px solid #222; }
.chart-wrap.phase { flex: 0 0 280px; border-left: 1px solid #222; }
.chart-label {
  position: absolute; top: 4px; left: 8px; z-index: 1;
  font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 0.5px;
  pointer-events: none;
}
.chart-label .val { color: #aaa; }
canvas { display: block; width: 100%; height: 100%; }

#legend {
  display: flex; gap: 12px; padding: 0 16px; align-items: center;
}
.leg-item { display: flex; align-items: center; gap: 4px; cursor: pointer; opacity: 0.9; }
.leg-item.hidden { opacity: 0.3; }
.leg-dot { width: 10px; height: 10px; border-radius: 2px; }

#cmd-bar {
  display: flex; gap: 8px; padding: 6px 16px; background: #111; border-top: 1px solid #333;
}
#cmd-bar input {
  flex: 1; background: #0a0a0a; color: #eee; border: 1px solid #333; border-radius: 4px;
  padding: 4px 8px; font-family: inherit; font-size: 13px;
}
#cmd-bar button { white-space: nowrap; }
</style>
</head>
<body>

<div id="toolbar">
  <div class="status" id="ws-status"></div>
  <div class="group">
    <label>Time</label>
    <button data-tw="100" title="2s">2s</button>
    <button data-tw="250" title="5s" class="active">5s</button>
    <button data-tw="500" title="10s">10s</button>
    <button data-tw="1500" title="30s">30s</button>
  </div>
  <div class="group" id="legend"></div>
  <div class="spacer"></div>
  <div class="group">
    <button id="btn-pause">⏸ Pause</button>
    <button id="btn-clear">Clear</button>
    <button id="btn-csv">CSV</button>
  </div>
  <span id="stats"></span>
</div>

<div id="charts">
  <!-- Row 1: Angles + Phase -->
  <div class="chart-row" style="flex:2">
    <div class="chart-wrap" id="cw-angles">
      <div class="chart-label">Angles (°) <span class="val" id="lbl-angles"></span></div>
      <canvas id="c-angles"></canvas>
    </div>
    <div class="chart-wrap phase" id="cw-phase">
      <div class="chart-label">Phase Portrait <span class="val" id="lbl-phase"></span></div>
      <canvas id="c-phase"></canvas>
    </div>
  </div>
  <!-- Row 2: Errors -->
  <div class="chart-row" style="flex:1.5">
    <div class="chart-wrap">
      <div class="chart-label">Error: target − actual (°) <span class="val" id="lbl-errors"></span></div>
      <canvas id="c-errors"></canvas>
    </div>
  </div>
  <!-- Row 3: Gain + Kinetic -->
  <div class="chart-row" style="flex:1">
    <div class="chart-wrap">
      <div class="chart-label">Gain / Kinetic <span class="val" id="lbl-gain"></span></div>
      <canvas id="c-gain"></canvas>
    </div>
  </div>
</div>

<div id="cmd-bar">
  <input id="cmd-input" placeholder="Send command (e.g. V 5 2, K 80 0 400 320, M 3, P 0 0 150 0 0 0)" />
  <button id="btn-send">Send</button>
</div>

<script>
// ===== Config =====
const COLORS = ['#e74c3c','#e67e22','#f1c40f','#2ecc71','#3498db','#9b59b6'];
const NAMES = ['M1','M2','M3','M4','M5','M6'];
const MAX_BUF = 3000; // 60 seconds at 50Hz
const DPR = window.devicePixelRatio || 1;

// ===== State =====
let ws = null;
let paused = false;
let timeWindow = 250; // samples visible
let selectedMotor = 0; // for phase portrait
let motorVisible = [true,true,true,true,true,true];
let sampleCount = 0;

// Ring buffers
const buf = {
  a: Array.from({length:6}, () => []),  // angles
  tgt: Array.from({length:6}, () => []),
  adj: Array.from({length:6}, () => []),
  vel: Array.from({length:6}, () => []), // computed velocity
  g: [],
  kinetic: [],
  ts: [],  // timestamps
};

// ===== WebSocket =====
function connectWS() {
  const loc = window.location;
  const wsUrl = `ws://${loc.hostname}:${loc.port || 3000}`;
  ws = new WebSocket(wsUrl);
  ws.onopen = () => document.getElementById('ws-status').classList.add('connected');
  ws.onclose = () => {
    document.getElementById('ws-status').classList.remove('connected');
    setTimeout(connectWS, 2000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = (ev) => {
    if (paused) return;
    try { onData(JSON.parse(ev.data)); } catch(e) {}
  };
}

function onData(d) {
  if (!d.a || d.a.length !== 6) return;
  const now = performance.now();
  sampleCount++;

  for (let i = 0; i < 6; i++) {
    const aArr = buf.a[i], vArr = buf.vel[i];
    const prev = aArr.length > 0 ? aArr[aArr.length - 1] : d.a[i];
    aArr.push(d.a[i]);
    vArr.push((d.a[i] - prev) / 0.02); // °/s

    if (d.tgt) buf.tgt[i].push(d.tgt[i]);
    else buf.tgt[i].push(null);

    if (d.adj) buf.adj[i].push(d.adj[i]);
    else buf.adj[i].push(null);

    // Trim
    if (aArr.length > MAX_BUF) {
      aArr.shift(); vArr.shift();
      buf.tgt[i].shift(); buf.adj[i].shift();
    }
  }

  buf.g.push(d.g != null ? d.g : null);
  // Compute kinetic same as firmware
  let kin = 0;
  for (let i = 0; i < 6; i++) {
    const aArr = buf.a[i];
    if (aArr.length >= 2) {
      const delta = aArr[aArr.length-1] - aArr[aArr.length-2];
      kin += delta * delta;
    }
  }
  buf.kinetic.push(kin);
  buf.ts.push(now);

  if (buf.g.length > MAX_BUF) { buf.g.shift(); buf.kinetic.shift(); buf.ts.shift(); }
}

function sendCmd(cmd) {
  if (ws && ws.readyState === 1) ws.send(cmd);
}

// ===== Canvas Helpers =====
function setupCanvas(canvas) {
  const rect = canvas.parentElement.getBoundingClientRect();
  const w = Math.floor(rect.width);
  const h = Math.floor(rect.height);
  canvas.width = w * DPR;
  canvas.height = h * DPR;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);
  return { ctx, w, h };
}

function autoRange(arrays, tw) {
  let min = Infinity, max = -Infinity;
  for (const arr of arrays) {
    const start = Math.max(0, arr.length - tw);
    for (let i = start; i < arr.length; i++) {
      if (arr[i] != null) {
        if (arr[i] < min) min = arr[i];
        if (arr[i] > max) max = arr[i];
      }
    }
  }
  if (min === Infinity) { min = 0; max = 1; }
  const pad = Math.max((max - min) * 0.1, 0.5);
  return { min: min - pad, max: max + pad };
}

function drawGrid(ctx, w, h, yMin, yMax, xSamples) {
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1;
  // Horizontal grid lines
  const ySteps = 4;
  const yRange = yMax - yMin;
  for (let i = 0; i <= ySteps; i++) {
    const y = h - (i / ySteps) * h;
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
    const val = yMin + (i / ySteps) * yRange;
    ctx.fillStyle = '#444';
    ctx.font = '10px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(val.toFixed(1), w - 4, y - 2);
  }
  // Zero line
  if (yMin < 0 && yMax > 0) {
    const y0 = h - (-yMin / yRange) * h;
    ctx.strokeStyle = '#333';
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(0, y0); ctx.lineTo(w, y0); ctx.stroke();
    ctx.setLineDash([]);
  }
  // Time markers
  ctx.fillStyle = '#333';
  ctx.textAlign = 'center';
  const secPerSample = 0.02;
  const totalSec = xSamples * secPerSample;
  const ticks = [1, 2, 5, 10, 15, 30];
  let step = ticks.find(t => totalSec / t <= 6) || 10;
  for (let s = step; s < totalSec; s += step) {
    const x = w - (s / secPerSample / xSamples) * w;
    if (x < 30) continue;
    ctx.fillText(`-${s}s`, x, h - 2);
  }
}

function drawTrace(ctx, arr, w, h, yMin, yMax, color, tw, lineWidth) {
  const n = arr.length;
  const start = Math.max(0, n - tw);
  const count = n - start;
  if (count < 2) return;
  const yRange = yMax - yMin;
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth || 1.5;
  ctx.beginPath();
  let first = true;
  for (let i = start; i < n; i++) {
    if (arr[i] == null) { first = true; continue; }
    const x = ((i - start) / (tw - 1)) * w;
    const y = h - ((arr[i] - yMin) / yRange) * h;
    if (first) { ctx.moveTo(x, y); first = false; }
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
}

// ===== Draw Functions =====
function drawAngles() {
  const canvas = document.getElementById('c-angles');
  const { ctx, w, h } = setupCanvas(canvas);
  ctx.clearRect(0, 0, w, h);

  const visible = [];
  for (let i = 0; i < 6; i++) if (motorVisible[i]) visible.push(buf.a[i]);
  const range = autoRange(visible, timeWindow);
  drawGrid(ctx, w, h, range.min, range.max, timeWindow);

  for (let i = 0; i < 6; i++) {
    if (!motorVisible[i]) continue;
    // Target (dim dashed)
    if (buf.tgt[i].length > 0) {
      ctx.setLineDash([3, 3]);
      ctx.globalAlpha = 0.3;
      drawTrace(ctx, buf.tgt[i], w, h, range.min, range.max, COLORS[i], timeWindow, 1);
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;
    }
    // Actual
    drawTrace(ctx, buf.a[i], w, h, range.min, range.max, COLORS[i], timeWindow, 1.5);
  }

  // Current values label
  const vals = [];
  for (let i = 0; i < 6; i++) {
    if (!motorVisible[i]) continue;
    const a = buf.a[i];
    if (a.length > 0) vals.push(`${NAMES[i]}:${a[a.length-1].toFixed(1)}°`);
  }
  document.getElementById('lbl-angles').textContent = vals.join('  ');
}

function drawErrors() {
  const canvas = document.getElementById('c-errors');
  const { ctx, w, h } = setupCanvas(canvas);
  ctx.clearRect(0, 0, w, h);

  // Compute errors
  const errors = [];
  for (let i = 0; i < 6; i++) {
    if (!motorVisible[i]) continue;
    const err = [];
    const n = buf.a[i].length;
    const start = Math.max(0, n - timeWindow);
    for (let j = start; j < n; j++) {
      if (buf.tgt[i][j] != null) err.push(buf.tgt[i][j] - buf.a[i][j]);
      else err.push(null);
    }
    errors.push({ idx: i, data: err });
  }

  const range = autoRange(errors.map(e => e.data), errors[0] ? errors[0].data.length : 0);
  drawGrid(ctx, w, h, range.min, range.max, errors[0] ? errors[0].data.length : timeWindow);

  for (const e of errors) {
    drawTrace(ctx, e.data, w, h, range.min, range.max, COLORS[e.idx], e.data.length, 1.5);
  }

  // RMS error
  let rms = 0, cnt = 0;
  for (const e of errors) {
    const last = e.data[e.data.length - 1];
    if (last != null) { rms += last * last; cnt++; }
  }
  rms = cnt > 0 ? Math.sqrt(rms / cnt) : 0;
  document.getElementById('lbl-errors').textContent = `RMS: ${rms.toFixed(2)}°`;
}

function drawGain() {
  const canvas = document.getElementById('c-gain');
  const { ctx, w, h } = setupCanvas(canvas);
  ctx.clearRect(0, 0, w, h);

  // Gain: left Y axis (0~1), Kinetic: right Y axis (auto)
  const gRange = { min: 0, max: 1.1 };
  const kRange = autoRange([buf.kinetic], timeWindow);
  kRange.min = 0;
  drawGrid(ctx, w, h, gRange.min, gRange.max, timeWindow);

  // Kinetic as filled area
  {
    const n = buf.kinetic.length;
    const start = Math.max(0, n - timeWindow);
    const count = n - start;
    if (count > 1) {
      const kRng = kRange.max - kRange.min || 1;
      ctx.fillStyle = 'rgba(231, 76, 60, 0.15)';
      ctx.beginPath();
      ctx.moveTo(0, h);
      for (let i = start; i < n; i++) {
        const x = ((i - start) / (timeWindow - 1)) * w;
        const y = h - ((buf.kinetic[i] - kRange.min) / kRng) * h;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(w, h);
      ctx.fill();
      // Kinetic line
      ctx.strokeStyle = '#c0392b';
      ctx.lineWidth = 1;
      ctx.beginPath();
      let first = true;
      for (let i = start; i < n; i++) {
        const x = ((i - start) / (timeWindow - 1)) * w;
        const y = h - ((buf.kinetic[i] - kRange.min) / kRng) * h;
        if (first) { ctx.moveTo(x, y); first = false; }
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
  }

  // Gain line
  drawTrace(ctx, buf.g, w, h, gRange.min, gRange.max, '#2ecc71', timeWindow, 2);

  // Right axis labels for kinetic
  ctx.fillStyle = '#c0392b';
  ctx.font = '10px monospace';
  ctx.textAlign = 'left';
  for (let i = 0; i <= 3; i++) {
    const val = kRange.min + (i / 3) * (kRange.max - kRange.min);
    const y = h - (i / 3) * h;
    ctx.fillText(`K:${val.toFixed(1)}`, 4, y - 2);
  }

  const lastG = buf.g.length > 0 ? buf.g[buf.g.length - 1] : null;
  const lastK = buf.kinetic.length > 0 ? buf.kinetic[buf.kinetic.length - 1] : 0;
  document.getElementById('lbl-gain').textContent =
    `g=${lastG != null ? lastG.toFixed(3) : '—'}  kinetic=${lastK.toFixed(2)}`;
}

function drawPhase() {
  const canvas = document.getElementById('c-phase');
  const { ctx, w, h } = setupCanvas(canvas);
  ctx.clearRect(0, 0, w, h);

  const mi = selectedMotor;
  const aArr = buf.a[mi];
  const vArr = buf.vel[mi];
  const tArr = buf.tgt[mi];
  const n = aArr.length;
  const start = Math.max(0, n - timeWindow);
  if (n - start < 2) return;

  // X = angle error (target - actual), Y = velocity
  const xs = [], ys = [];
  for (let i = start; i < n; i++) {
    if (tArr[i] != null) {
      xs.push(tArr[i] - aArr[i]);
    } else {
      xs.push(aArr[i] - (aArr[start] || 90));
    }
    ys.push(vArr[i] || 0);
  }

  // Auto range with symmetric X
  let xMax = 0.5, yMax = 10;
  for (let i = 0; i < xs.length; i++) {
    xMax = Math.max(xMax, Math.abs(xs[i]));
    yMax = Math.max(yMax, Math.abs(ys[i]));
  }
  xMax *= 1.2; yMax *= 1.2;

  // Grid
  const cx = w / 2, cy = h / 2;
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1;
  // Crosshair
  ctx.strokeStyle = '#333';
  ctx.setLineDash([4, 4]);
  ctx.beginPath(); ctx.moveTo(0, cy); ctx.lineTo(w, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, h); ctx.stroke();
  ctx.setLineDash([]);

  // Axis labels
  ctx.fillStyle = '#555';
  ctx.font = '10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`err(°)`, cx, h - 2);
  ctx.fillText(`${(-xMax).toFixed(1)}`, 4, cy - 4);
  ctx.fillText(`${xMax.toFixed(1)}`, w - 4, cy - 4);
  ctx.save();
  ctx.translate(12, cy);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText('vel(°/s)', 0, 0);
  ctx.restore();

  // Trace with fade (older = dimmer)
  const count = xs.length;
  for (let i = 1; i < count; i++) {
    const alpha = 0.1 + 0.9 * (i / count);
    const x1 = cx + (xs[i-1] / xMax) * (w / 2);
    const y1 = cy - (ys[i-1] / yMax) * (h / 2);
    const x2 = cx + (xs[i] / xMax) * (w / 2);
    const y2 = cy - (ys[i] / yMax) * (h / 2);
    ctx.strokeStyle = COLORS[mi];
    ctx.globalAlpha = alpha;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Current point
  if (count > 0) {
    const lx = cx + (xs[count-1] / xMax) * (w / 2);
    const ly = cy - (ys[count-1] / yMax) * (h / 2);
    ctx.fillStyle = COLORS[mi];
    ctx.beginPath(); ctx.arc(lx, ly, 4, 0, Math.PI * 2); ctx.fill();
  }

  document.getElementById('lbl-phase').textContent =
    `${NAMES[mi]}  spiral out=unstable`;
}

// ===== Render Loop =====
function render() {
  if (!paused) {
    drawAngles();
    drawErrors();
    drawGain();
    drawPhase();
  }
  document.getElementById('stats').textContent = `${sampleCount} samples | ${buf.a[0].length} buffered`;
  requestAnimationFrame(render);
}

// ===== UI Setup =====
function initUI() {
  // Legend
  const legend = document.getElementById('legend');
  for (let i = 0; i < 6; i++) {
    const el = document.createElement('div');
    el.className = 'leg-item';
    el.innerHTML = `<div class="leg-dot" style="background:${COLORS[i]}"></div><span>${NAMES[i]}</span>`;
    el.addEventListener('click', () => {
      motorVisible[i] = !motorVisible[i];
      el.classList.toggle('hidden', !motorVisible[i]);
    });
    el.addEventListener('dblclick', (e) => {
      e.preventDefault();
      selectedMotor = i;
    });
    legend.appendChild(el);
  }

  // Time window buttons
  document.querySelectorAll('[data-tw]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-tw]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      timeWindow = parseInt(btn.dataset.tw);
    });
  });

  // Pause
  const btnPause = document.getElementById('btn-pause');
  btnPause.addEventListener('click', () => {
    paused = !paused;
    btnPause.textContent = paused ? '▶ Resume' : '⏸ Pause';
    btnPause.classList.toggle('active', paused);
  });

  // Clear
  document.getElementById('btn-clear').addEventListener('click', () => {
    for (let i = 0; i < 6; i++) {
      buf.a[i].length = 0; buf.tgt[i].length = 0;
      buf.adj[i].length = 0; buf.vel[i].length = 0;
    }
    buf.g.length = 0; buf.kinetic.length = 0; buf.ts.length = 0;
    sampleCount = 0;
  });

  // CSV export
  document.getElementById('btn-csv').addEventListener('click', exportCSV);

  // Command bar
  const cmdInput = document.getElementById('cmd-input');
  const btnSend = document.getElementById('btn-send');
  const doSend = () => {
    const cmd = cmdInput.value.trim();
    if (cmd) { sendCmd(cmd); cmdInput.value = ''; }
  };
  btnSend.addEventListener('click', doSend);
  cmdInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') doSend(); });

  // Keyboard shortcuts
  document.addEventListener('keydown', (e) => {
    if (e.target === cmdInput) return;
    if (e.key === ' ') { e.preventDefault(); btnPause.click(); }
    if (e.key >= '1' && e.key <= '6') { selectedMotor = parseInt(e.key) - 1; }
  });
}

function exportCSV() {
  const n = buf.a[0].length;
  if (n === 0) return;
  let csv = 'sample,a1,a2,a3,a4,a5,a6,tgt1,tgt2,tgt3,tgt4,tgt5,tgt6,v1,v2,v3,v4,v5,v6,gain,kinetic\n';
  for (let j = 0; j < n; j++) {
    const row = [j];
    for (let i = 0; i < 6; i++) row.push(buf.a[i][j]?.toFixed(3) ?? '');
    for (let i = 0; i < 6; i++) row.push(buf.tgt[i][j]?.toFixed(3) ?? '');
    for (let i = 0; i < 6; i++) row.push(buf.vel[i][j]?.toFixed(3) ?? '');
    row.push(buf.g[j]?.toFixed(4) ?? '');
    row.push(buf.kinetic[j]?.toFixed(4) ?? '');
    csv += row.join(',') + '\n';
  }
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `scope_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.csv`;
  a.click();
}

// ===== Start =====
initUI();
connectWS();
requestAnimationFrame(render);
</script>
</body>
</html>
