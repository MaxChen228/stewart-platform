<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Stewart · 陀螺儀</title>
<style>
:root{
  --bg:#f7f4ef; --surface:#fffdf9; --ink:#27231f; --sub:#766f67; --line:#ded7cd;
  --ok:#326f63; --warn:#b2642c; --bad:#b73b36; --blue:#3d6388;
  --mono:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Segoe UI",sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);}
body{padding:max(16px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right)) max(20px,env(safe-area-inset-bottom)) max(16px,env(safe-area-inset-left));}
.shell{max-width:520px;margin:0 auto;display:grid;gap:16px;}
.status{display:flex;gap:8px;justify-content:center;}
.pill{border:1px solid var(--line);border-radius:6px;padding:6px 14px;font:700 12px var(--mono);color:var(--sub);background:var(--surface);letter-spacing:.04em;}
.pill.ok{border-color:rgba(50,111,99,.55);color:var(--ok);}
.pill.bad{border-color:rgba(183,59,54,.55);color:var(--bad);}
.attitude{position:relative;aspect-ratio:1;width:min(72vw,320px);justify-self:center;border:1px solid var(--line);border-radius:50%;background:
  radial-gradient(circle at center,rgba(61,99,136,.12) 0 3px,transparent 4px),
  linear-gradient(90deg,transparent calc(50% - .5px),rgba(39,35,31,.15) calc(50% - .5px) calc(50% + .5px),transparent calc(50% + .5px)),
  linear-gradient(0deg,transparent calc(50% - .5px),rgba(39,35,31,.15) calc(50% - .5px) calc(50% + .5px),transparent calc(50% + .5px)),
  #fbf8f2;overflow:hidden;}
.attitude::after{content:"";position:absolute;inset:16%;border:1px dashed rgba(39,35,31,.18);border-radius:50%;}
.dot{position:absolute;left:50%;top:50%;width:30px;height:30px;border-radius:50%;background:var(--blue);border:3px solid #fff;transform:translate(-50%,-50%);box-shadow:0 4px 16px rgba(61,99,136,.3);transition:background .12s;}
.dot.bad{background:var(--bad);}
.numbers{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.num{border:1px solid var(--line);border-radius:6px;background:var(--surface);padding:10px;text-align:center;}
.num span{display:block;font:600 10px var(--mono);color:var(--sub);letter-spacing:.1em;}
.num b{display:block;font:700 24px var(--mono);font-variant-numeric:tabular-nums;margin-top:4px;}
button{width:100%;min-height:58px;border:1px solid var(--blue);border-radius:8px;background:var(--blue);color:#fff;font:700 16px var(--sans);letter-spacing:.04em;}
button:active{transform:translateY(1px);}
.log{text-align:center;color:var(--sub);font:11px/1.5 var(--mono);min-height:20px;}
.log.good{color:var(--ok);} .log.warn{color:var(--warn);} .log.bad{color:var(--bad);}
</style>
</head>
<body>
<main class="shell">
  <div class="status">
    <div class="pill bad" id="ws-pill">連線 ··</div>
    <div class="pill" id="follow-pill">待機</div>
  </div>

  <div class="attitude"><div class="dot" id="dot"></div></div>

  <div class="numbers">
    <div class="num"><span>ROLL</span><b id="v-roll">0.0</b></div>
    <div class="num"><span>PITCH</span><b id="v-pitch">0.0</b></div>
    <div class="num"><span>YAW</span><b id="v-yaw">0.0</b></div>
  </div>

  <button id="cal-btn">校正（歸零當前姿態）</button>
  <div class="log" id="log">點「校正」授權陀螺儀並歸零</div>
</main>

<script src="/sysid/kin.js"></script>
<script>
// 極簡手機陀螺儀來源：讀 IMU → 映射成 roll/pitch 偏移 → 串 PF 進統一跟隨管線。
// FOLLOW on/off 由 dashboard 控；手機觀測遙測 fl 自動開始/停止串流。映射參數 hardcode。
const Kin = window.Kin, NEUTRAL_Z = Kin.NEUTRAL_Z;
const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
const byId = (id)=>document.getElementById(id);
const fmt = (v)=>Number.isFinite(v)?v.toFixed(1):'--';
const wrapDeg = (d)=>{let v=Number(d)||0;while(v>180)v-=360;while(v<-180)v+=360;return v;};

// 固定映射（取代原滑桿）：手機傾 phoneFull° → 平台傾 maxTilt°，deadband 死區，tau 一階平滑。
const MAP = { maxTilt:8, phoneFull:35, yawMax:10, tau:0.18, deadband:0.2, axisYaw:false };

let ws=null, wsConnected=false, followActive=false, sessionActive=false;
let homePose=[0,0,NEUTRAL_Z+28,0,0,0], basePose=homePose.slice(), cmdPose=basePose.slice();
let sensorOn=false, sensorRaw=null, sensorBase=null, filtRpy=[0,0,0], cmdRpy=[0,0,0];
let lastSensorAt=0, pfPending=null, pfLast=0, pfTimer=null;

function setLog(t,tone=''){const e=byId('log');e.textContent=t;e.className=`log ${tone}`;}
function setPills(){
  byId('ws-pill').textContent = wsConnected?'連線 OK':'連線 ··';
  byId('ws-pill').className = `pill ${wsConnected?'ok':'bad'}`;
  byId('follow-pill').textContent = followActive?'跟隨中':'待機';
  byId('follow-pill').className = `pill ${followActive?'ok':''}`;
}
function sendCmd(c){ if(ws&&ws.readyState===WebSocket.OPEN){ws.send(c);return true;} return false; }

function screenAdjusted(beta,gamma){
  const a=Number(screen.orientation?.angle ?? window.orientation ?? 0);
  if(a===90) return {roll:beta,pitch:-gamma};
  if(a===-90||a===270) return {roll:-beta,pitch:gamma};
  if(Math.abs(a)===180) return {roll:-gamma,pitch:-beta};
  return {roll:gamma,pitch:beta};
}
function orientationRaw(e){
  const beta=Number(e.beta), gamma=Number(e.gamma);
  if(!Number.isFinite(beta)||!Number.isFinite(gamma)) return null;
  const t=screenAdjusted(beta,gamma);
  return {roll:t.roll,pitch:t.pitch,yaw:Number.isFinite(Number(e.alpha))?Number(e.alpha):0};
}
function shaped(v,maxOut){
  const db=MAP.deadband, a=Math.abs(v);
  if(a<=db) return 0;
  const live=Math.max(1,MAP.phoneFull)-db;
  return clamp(Math.sign(v)*((a-db)/live)*maxOut,-maxOut,maxOut);
}
function targetRpy(){
  if(!sensorRaw||!sensorBase) return [0,0,0];
  return [
    shaped(sensorRaw.roll-sensorBase.roll, MAP.maxTilt),
    shaped(sensorRaw.pitch-sensorBase.pitch, MAP.maxTilt),
    MAP.axisYaw ? shaped(wrapDeg(sensorRaw.yaw-sensorBase.yaw), MAP.yawMax) : 0,
  ];
}
function computePose(force=false){
  const now=performance.now();
  const dt=lastSensorAt?Math.max(0.001,(now-lastSensorAt)/1000):0.016; lastSensorAt=now;
  const tgt=targetRpy(), tau=Math.max(0.02,MAP.tau), a=force?1:clamp(dt/(tau+dt),0,1);
  for(let i=0;i<3;i++) filtRpy[i]+=(tgt[i]-filtRpy[i])*a;
  cmdRpy=filtRpy.slice();
  cmdPose=basePose.slice(); cmdPose[3]+=cmdRpy[0]; cmdPose[4]+=cmdRpy[1]; cmdPose[5]+=cmdRpy[2];
  render();
  return Kin.ik(cmdPose).valid;
}
function render(){
  const valid=Kin.ik(cmdPose).valid;
  byId('dot').classList.toggle('bad',!valid);
  const x=clamp(cmdRpy[0]/MAP.maxTilt,-1,1)*40, y=clamp(cmdRpy[1]/MAP.maxTilt,-1,1)*40;
  byId('dot').style.transform=`translate(calc(-50% + ${x}%),calc(-50% + ${y}%))`;
  byId('v-roll').textContent=fmt(cmdRpy[0]);
  byId('v-pitch').textContent=fmt(cmdRpy[1]);
  byId('v-yaw').textContent=fmt(cmdRpy[2]);
}
function flushPF(){
  pfTimer=null;
  if(!pfPending||!followActive){pfPending=null;return;}
  pfLast=performance.now();
  sendCmd(`PF ${pfPending.map(x=>x.toFixed(3)).join(' ')}`);
  pfPending=null;
}
function streamPF(pose){
  pfPending=pose.slice();
  const dt=performance.now()-pfLast;
  if(dt>=33) flushPF(); else if(!pfTimer) pfTimer=setTimeout(flushPF,33-dt);
}
function onOrientation(e){
  const raw=orientationRaw(e); if(!raw) return;
  sensorRaw=raw; if(!sensorBase) sensorBase={...sensorRaw};
  const ok=computePose(false);
  if(followActive && ok && !sessionActive) streamPF(cmdPose);
}
async function enableSensor(){
  if(!window.isSecureContext){ setLog('需 HTTPS：請從 dashboard 的 QR 開啟','bad'); return false; }
  if(!window.DeviceOrientationEvent){ setLog('此瀏覽器無 DeviceOrientation','bad'); return false; }
  try{
    if(typeof DeviceOrientationEvent.requestPermission==='function'){
      const p=await DeviceOrientationEvent.requestPermission();
      if(p!=='granted'){ setLog(`陀螺儀權限：${p}`,'bad'); return false; }
    }
    window.addEventListener('deviceorientation',onOrientation,true);
    sensorOn=true; return true;
  }catch(err){ setLog(`陀螺儀錯誤：${err.message}`,'bad'); return false; }
}
async function calibrate(){
  if(!sensorOn){ const ok=await enableSensor(); if(!ok) return; }
  // 等一筆樣本
  if(!sensorRaw){ await new Promise(r=>{const s=performance.now();(function tick(){ sensorRaw||performance.now()-s>1200?r():setTimeout(tick,40);})();}); }
  if(!sensorRaw){ setLog('還沒有姿態資料；輕微移動手機再校正','warn'); return; }
  sensorBase={...sensorRaw}; filtRpy=[0,0,0]; cmdRpy=[0,0,0];
  computePose(true);
  setLog(followActive?'已歸零 · 跟隨中':'已歸零 · 等 dashboard 啟動跟隨','good');
}
function onFollowOn(pose){
  if(Array.isArray(pose)&&pose.length===6&&pose.every(Number.isFinite)) basePose=pose.map(Number);
  followActive=true; if(sensorOn) calibrate(); setPills();
}
function connectWS(){
  const proto=location.protocol==='https:'?'wss':'ws';
  ws=new WebSocket(`${proto}://${location.host}`);
  ws.onopen=()=>{ wsConnected=true; setPills(); setLog('已連線','good'); };
  ws.onmessage=(e)=>{
    let d; try{ d=JSON.parse(e.data); }catch{ return; }
    if(d.evt==='session'){ sessionActive=!!d.active; if(sessionActive) followActive=false; setPills(); return; }
    if(d.fl!==undefined) followActive=!!d.fl;
    if(Array.isArray(d.a)&&d.a.length===6&&!followActive){
      const fk=Kin.solveFK(d.a.map(Number));
      if(fk?.converged&&Array.isArray(fk.pose)) basePose=fk.pose.map(Number);
    }
    if(d.status==='follow on'&&Array.isArray(d.pose)) onFollowOn(d.pose);
    if(d.status==='follow off') followActive=false;
    setPills();
  };
  ws.onclose=()=>{ wsConnected=false; followActive=false; setPills(); setLog('斷線，重連中…','warn'); setTimeout(connectWS,1000); };
}
async function loadConfig(){
  try{
    const r=await fetch('/api/platform-config'); if(!r.ok) return;
    const d=await r.json(); const p=Array.isArray(d.homePose)?d.homePose:d.pose;
    if(Array.isArray(p)&&p.length===6&&p.every(Number.isFinite)){ homePose=p.map(Number); basePose=homePose.slice(); cmdPose=basePose.slice(); }
  }catch{}
}
byId('cal-btn').addEventListener('click',calibrate);
render(); setPills(); loadConfig(); connectWS();
</script>
</body>
</html>
