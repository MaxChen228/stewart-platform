<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stewart 執行紀錄</title>
<link rel="stylesheet" href="lab.css">
<style>
body { align-items:stretch; padding:18px; background:#0b0d0e; }
.lab-top, .wrap { max-width:1440px; margin-left:auto; margin-right:auto; }
.run-layout { display:grid; grid-template-columns:minmax(320px,380px) minmax(0,1fr); gap:14px; align-items:start; }
.panel { border:1px solid #2b3032; border-radius:8px; background:#121516; overflow:hidden; }
.panel-head { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px 14px; border-bottom:1px solid var(--line2); }
.panel-title { font-weight:700; letter-spacing:.06em; color:var(--ink); }
.toolbar { display:flex; flex-wrap:wrap; gap:8px; padding:12px 14px; border-bottom:1px solid var(--line2); }
.toolbar input, .toolbar select {
  min-width:0; padding:9px 10px; border:1px solid var(--line2); border-radius:7px;
  background:#0d0d0d; color:var(--ink); font-family:var(--mono);
}
.toolbar input { flex:1 1 160px; }
.toolbar select { flex:0 0 128px; }
.run-list { max-height:calc(100vh - 206px); overflow:auto; }
.run-item { width:100%; display:block; text-align:left; padding:12px 14px; border:0; border-bottom:1px solid #1f1f1f;
  border-radius:0; background:transparent; color:var(--ink); cursor:pointer; font:inherit; }
.run-item:hover { background:#171b1c; }
.run-item.sel { background:#13201c; box-shadow:inset 3px 0 0 var(--go); }
.run-name { font-weight:700; line-height:1.35; color:#e5e5e5; word-break:break-word; }
.run-meta { margin-top:8px; display:flex; flex-wrap:wrap; gap:6px; color:var(--dim); font-size:11px; }
.pill { display:inline-flex; align-items:center; min-height:22px; padding:2px 7px; border:1px solid var(--line2); border-radius:999px; color:var(--dim); background:#0f0f0f; }
.pill.good { border-color:#27583b; color:#8fd; }
.pill.warn { border-color:#6b3b1e; color:#fb8; }
.pill.bad { border-color:#733; color:#f99; }
.detail { display:flex; flex-direction:column; gap:16px; }
.hero { padding:14px 16px; }
.hero h1 { font-size:17px; line-height:1.35; margin-bottom:8px; word-break:break-word; letter-spacing:0; }
.hero-sub { color:var(--dim); font-size:12px; line-height:1.55; }
.run-actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
.run-actions button { flex:0 0 auto; padding:9px 12px; font-size:12px; border-radius:7px; }
.run-actions button.archive { color:var(--warn-ink); border-color:var(--warn); background:var(--warn-bg); }
.run-actions button.delete { color:var(--bad-ink); border-color:var(--bad); background:var(--bad-bg); }
.notice { margin-top:10px; color:var(--dim); font-size:12px; min-height:18px; }
.metric-grid { display:grid; grid-template-columns:repeat(5,minmax(120px,1fr)); gap:10px; padding:14px; }
.metric { border:1px solid #2b3032; border-radius:7px; background:#0d1011; padding:12px; min-height:78px; }
.metric .k { color:var(--dim); font-size:11px; letter-spacing:.08em; margin-bottom:8px; }
.metric .v { font-size:22px; color:#e8e8e8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.metric .s { margin-top:5px; color:var(--faint); font-size:11px; line-height:1.4; }
.tabs { display:flex; gap:8px; padding:10px 12px; border-bottom:1px solid var(--line2); }
.tabs button { flex:0 0 auto; padding:8px 12px; font-size:12px; border-radius:7px; }
.tabs button.active { background:var(--go-bg); border-color:var(--go); color:var(--go-ink); }
.tab-body { padding:12px; }
.plots { display:grid; grid-template-columns:1fr; gap:14px; }
.plot-card { border:1px solid var(--line2); border-radius:8px; overflow:hidden; background:#050505; }
.plot-card .cap { padding:9px 11px; border-bottom:1px solid var(--line2); color:var(--dim); font-size:12px; }
.plot-card img { width:100%; display:block; background:#050505; }
.replay-grid { display:grid; grid-template-columns:minmax(0,1fr) 310px; gap:12px; align-items:start; }
.replay-main { display:grid; gap:12px; min-width:0; }
.plane-row { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; }
.plane-card, .replay-stage { border:1px solid #2b3032; border-radius:8px; background:#050707; overflow:hidden; min-width:0; }
.plane-cap { display:flex; justify-content:space-between; gap:10px; padding:8px 10px; border-bottom:1px solid #202628; color:#c7d0d2; font-size:11px; letter-spacing:.08em; }
.plane-cap span:last-child { color:#6f797c; letter-spacing:0; white-space:nowrap; }
.plane-canvas { width:100%; aspect-ratio:1.18/1; height:auto; min-height:210px; background:#050707; display:block; }
.replay-stage { aspect-ratio:1/1; position:relative; }
.replay-stage canvas { width:100% !important; height:100% !important; display:block; }
.replay-stage .stage-empty { position:absolute; inset:0; display:grid; place-items:center; color:#777; font-size:12px; pointer-events:none; }
.replay-side { display:flex; flex-direction:column; gap:10px; }
.replay-controls { border:1px solid #2b3032; border-radius:8px; background:#0d1011; padding:12px; }
.replay-controls button { flex:0 0 auto; width:100%; padding:11px 0; font-size:13px; border-radius:7px; }
.replay-control-row { display:flex; gap:8px; margin-top:10px; }
.replay-control-row button { padding:9px 0; font-size:11px; }
.replay-side input[type="range"] { width:100%; }
.replay-readout { border:1px solid #2b3032; border-radius:8px; background:#0d1011; padding:12px; }
.replay-note { color:#777; font-size:12px; line-height:1.55; }
.motor-label {
  padding:3px 5px; border:1px solid rgba(255,255,255,.22); border-radius:4px;
  background:rgba(10,12,13,.72); color:#d7dcdd; font-size:11px; pointer-events:none;
}
.kv { display:grid; grid-template-columns:170px minmax(0,1fr); gap:8px 12px; align-items:start; font-size:12px; }
.kv .key { color:var(--dim); }
.kv .val { color:#ddd; word-break:break-word; }
pre { max-height:430px; overflow:auto; padding:14px; border:1px solid var(--line2); border-radius:8px; background:#080808; color:#ccc;
  white-space:pre-wrap; word-break:break-word; font-size:12px; line-height:1.45; }
.file-links { display:flex; flex-wrap:wrap; gap:8px; }
.file-links a { display:inline-flex; padding:7px 9px; border:1px solid var(--line2); border-radius:7px; color:#9df; background:#0d0d0d; font-size:12px; }
.empty-state { padding:36px; text-align:center; color:var(--dim); border:1px dashed var(--line2); border-radius:10px; }
@media (max-width: 900px) {
  body { padding:14px; }
  .run-layout, .replay-grid, .plane-row { grid-template-columns:1fr; }
  .run-list { max-height:360px; }
  .metric-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
  .plane-canvas { min-height:240px; }
}
</style>
</head>
<body>
<div id="lab-header"></div>
<div class="wrap">
  <div class="lab-status" style="font-size:20px;">執行紀錄</div>
  <div class="lab-hint">每筆實驗的波形、軌跡回放、參數、摘要與原始檔集中查閱。</div>

  <div class="run-layout">
    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">RUNS</div>
        <button id="refresh" style="flex:0 0 auto;padding:8px 12px;font-size:12px;">刷新</button>
      </div>
      <div class="toolbar">
        <input id="search" placeholder="搜尋 run / 條件 / profile">
        <select id="profile"><option value="">全部類型</option></select>
      </div>
      <div class="run-list" id="run-list"><div class="empty-state">讀取中...</div></div>
    </section>

    <main class="detail" id="detail">
      <div class="empty-state">選一筆執行紀錄，這裡會展開完整細節。</div>
    </main>
  </div>
</div>

<script src="lab.js"></script>
<script src="/sysid/kin.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

Lab.mountHeader('執行紀錄', { back: { text: '‹ 研究首頁', href: './' }, showWs: false });

const state = { runs: [], filtered: [], selected: null, detail: null, tab: 'overview', replayIndex: 0, playing: false, raf: null, replay3d: null };
const fmt = {
  n(v, d = 2) { return Number.isFinite(Number(v)) ? Number(v).toFixed(d) : '—'; },
  int(v) { return Number.isFinite(Number(v)) ? String(Math.round(Number(v))) : '—'; },
  pct(v) { return Number.isFinite(Number(v)) ? `${(Number(v) * 100).toFixed(1)}%` : '—'; },
  time(s) { return Number.isFinite(Number(s)) ? `${Number(s).toFixed(1)}s` : '—'; },
  date(x) { if (!x) return '—'; const d = new Date(x); return Number.isNaN(d.getTime()) ? x : d.toLocaleString(); },
};

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function fileUrl(p) { return `/api/run-file?p=${encodeURIComponent(p)}`; }
function jsonBlock(x) { return `<pre>${esc(JSON.stringify(x ?? {}, null, 2))}</pre>`; }
function scoreClass(s) {
  if (!Number.isFinite(Number(s))) return '';
  if (s >= 75) return 'good';
  if (s >= 55) return 'warn';
  return 'bad';
}
function shortRunName(r) {
  return r.name && r.name !== 'capture' ? r.name : r.id.replace(/_\d{4}-\d{2}-\d{2}T.*/, '');
}

async function loadRuns(selectId = null) {
  const box = $('run-list');
  box.innerHTML = '<div class="empty-state">讀取中...</div>';
  const res = await fetch('/api/runs');
  const data = await res.json();
  state.runs = data.runs || [];
  syncProfiles();
  applyFilter();
  const pick = selectId || state.selected || state.filtered[0]?.id;
  if (pick) await selectRun(pick);
}

function syncProfiles() {
  const cur = $('profile').value;
  const profiles = [...new Set(state.runs.map(r => r.profile || 'unknown'))].sort();
  $('profile').innerHTML = '<option value="">全部類型</option>' + profiles.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join('');
  $('profile').value = profiles.includes(cur) ? cur : '';
}

function applyFilter() {
  const q = $('search').value.trim().toLowerCase();
  const p = $('profile').value;
  state.filtered = state.runs.filter(r => {
    const hay = `${r.id} ${r.name} ${r.profile || ''} ${JSON.stringify(r.condition || {})}`.toLowerCase();
    return (!p || (r.profile || 'unknown') === p) && (!q || hay.includes(q));
  });
  renderList();
}

function renderList() {
  const box = $('run-list');
  if (!state.filtered.length) {
    box.innerHTML = '<div class="empty-state">沒有符合條件的紀錄。</div>';
    return;
  }
  box.innerHTML = state.filtered.map(r => {
    const score = Number(r.score);
    const health = r.health || {};
    const can = Number.isFinite(Number(health.rxDropPerS)) ? `${fmt.n(health.rxDropPerS, 1)} drop/s` :
                Number.isFinite(Number(health.rxDropSum)) ? `drop ${fmt.int(health.rxDropSum)}` : 'CAN —';
    return `<button class="run-item ${state.selected === r.id ? 'sel' : ''}" data-id="${esc(r.id)}">
      <div class="run-name">${esc(shortRunName(r))}</div>
      <div class="run-meta">
        <span class="pill ${scoreClass(score)}">score ${fmt.n(score, 1)}</span>
        <span class="pill">${esc(r.profile || 'unknown')}</span>
        <span class="pill">${fmt.time(r.durationS)}</span>
        <span class="pill">${fmt.int(r.samples)} samples</span>
        <span class="pill">${esc(can)}</span>
      </div>
      <div class="run-meta"><span>${esc(fmt.date(r.wallClock))}</span></div>
    </button>`;
  }).join('');
  box.querySelectorAll('.run-item').forEach(btn => btn.onclick = () => selectRun(btn.dataset.id));
}

async function selectRun(id) {
  state.selected = id;
  state.tab = 'overview';
  state.replayIndex = 0;
  stopReplay();
  renderList();
  $('detail').innerHTML = '<div class="empty-state">讀取細節...</div>';
  const res = await fetch(`/api/runs/${encodeURIComponent(id)}`);
  state.detail = await res.json();
  renderDetail();
}

function metric(label, value, sub = '') {
  return `<div class="metric"><div class="k">${esc(label)}</div><div class="v">${esc(value)}</div>${sub ? `<div class="s">${esc(sub)}</div>` : ''}</div>`;
}

function renderDetail() {
  const d = state.detail;
  const r = d.run || {};
  const st = d.stability || {};
  const cond = d.manifest?.condition || r.condition || {};
  const health = r.health || {};
  $('detail').innerHTML = `
    <section class="panel hero">
      <h1>${esc(r.id || state.selected)}</h1>
      <div class="hero-sub">
        ${esc(fmt.date(r.wallClock))} · ${esc(r.profile || 'unknown')} · ${fmt.int(r.samples)} samples · ${fmt.time(r.durationS)}
      </div>
      <div class="run-meta" style="margin-top:12px;">
        <span class="pill ${scoreClass(r.score)}">stability ${fmt.n(r.score, 1)}</span>
        <span class="pill">profile ${esc(r.profile || 'unknown')}</span>
        <span class="pill">PID ${esc((cond.pid || d.manifest?.latest?.pid || []).join?.('/') || '—')}</span>
        <span class="pill">CAN ${fmt.n(health.rxDropPerS, 1)} drop/s</span>
      </div>
      <div class="run-actions">
        <button class="archive" id="archive-run">封存</button>
        <button class="delete" id="delete-run">刪除</button>
      </div>
      <div class="notice" id="op-status"></div>
    </section>

    <section class="panel">
      <div class="metric-grid">
        ${metric('STABILITY', fmt.n(r.score, 1), '總分：越高越穩')}
        ${metric('TRACKING', fmt.n(st.score?.trackingCost, 1), '任務軸成本：越低越好')}
        ${metric('CROSS AXIS', fmt.n(st.score?.crossAxisCost, 1), '非任務軸成本：越低越好')}
        ${metric('OSCILLATION', fmt.n(st.score?.oscillationCost, 1), '高頻晃動成本：越低越好')}
        ${metric('QUALITY', fmt.n(st.score?.qualityPenalty, 1), 'CAN / FK / telemetry 懲罰')}
      </div>
    </section>

    <section class="panel">
      <div class="tabs">
        ${tabButton('overview', '總覽')}
        ${tabButton('waveforms', '波形圖')}
        ${tabButton('replay', '軌跡回放')}
        ${tabButton('params', '參數')}
        ${tabButton('raw', '原始資料')}
      </div>
      <div class="tab-body" id="tab-body"></div>
    </section>`;
  $('detail').querySelectorAll('[data-tab]').forEach(b => b.onclick = () => { state.tab = b.dataset.tab; renderTab(); });
  $('archive-run').onclick = () => runOperation('archive');
  $('delete-run').onclick = () => runOperation('delete');
  renderTab();
}

function tabButton(id, label) {
  return `<button class="${state.tab === id ? 'active' : ''}" data-tab="${id}">${label}</button>`;
}

function renderTab() {
  const d = state.detail;
  const r = d.run || {};
  $('detail').querySelectorAll('[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === state.tab));
  const body = $('tab-body');
  if (state.tab !== 'replay') {
    stopReplay();
    destroyReplay3d();
  }
  if (state.tab === 'overview') body.innerHTML = overviewHtml(d);
  if (state.tab === 'waveforms') body.innerHTML = waveformsHtml(r);
  if (state.tab === 'replay') {
    body.innerHTML = replayHtml(d);
    setupReplay();
  }
  if (state.tab === 'params') body.innerHTML = paramsHtml(d);
  if (state.tab === 'raw') body.innerHTML = rawHtml(r);
}

function overviewHtml(d) {
  const r = d.run || {};
  const st = d.stability || {};
  const s = d.summary || {};
  return `<div class="kv">
    <div class="key">Run ID</div><div class="val">${esc(r.id)}</div>
    <div class="key">時間</div><div class="val">${esc(fmt.date(r.wallClock))}</div>
    <div class="key">類型</div><div class="val">${esc(r.profile || 'unknown')}</div>
    <div class="key">錄製長度</div><div class="val">${fmt.time(r.durationS)} · ${fmt.int(r.samples)} samples · ${fmt.int(r.cmdCount)} commands</div>
    <div class="key">穩定分數</div><div class="val">${fmt.n(r.score, 2)}</div>
    <div class="key">成本</div><div class="val">tracking ${fmt.n(st.score?.trackingCost)} / cross ${fmt.n(st.score?.crossAxisCost)} / osc ${fmt.n(st.score?.oscillationCost)} / quality ${fmt.n(st.score?.qualityPenalty)}</div>
    <div class="key">CAN</div><div class="val">efOr ${fmt.int(r.health?.canEfOr)} · rxDrop ${fmt.int(r.health?.rxDropSum)} · ${fmt.n(r.health?.rxDropPerS, 2)} drop/s</div>
    <div class="key">Encoder</div><div class="val">failFrac ${fmt.pct(s.encoders?.failFrac)}</div>
  </div>`;
}

function waveformsHtml(r) {
  const plane = r.files?.planePlot;
  const motor = r.files?.motorPlot;
  return `<div class="plots">
    <div class="plot-card"><div class="cap">Plane 6-DOF waveform</div>${plane ? `<img src="${fileUrl(plane)}" alt="plane waveform">` : '<div class="empty-state">沒有 plane plot。</div>'}</div>
    <div class="plot-card"><div class="cap">Motor 6-axis waveform</div>${motor ? `<img src="${fileUrl(motor)}" alt="motor waveform">` : '<div class="empty-state">沒有 motor plot。</div>'}</div>
  </div>`;
}

function replayHtml(d) {
  return `<div class="replay-grid">
    <div class="replay-main">
      <div class="plane-row">
        <div class="plane-card">
          <div class="plane-cap"><span>XY PLANE</span><span>top view</span></div>
          <canvas class="plane-canvas" id="plane-xy" width="520" height="440"></canvas>
        </div>
        <div class="plane-card">
          <div class="plane-cap"><span>YZ PLANE</span><span>front side</span></div>
          <canvas class="plane-canvas" id="plane-yz" width="520" height="440"></canvas>
        </div>
        <div class="plane-card">
          <div class="plane-cap"><span>XZ PLANE</span><span>right side</span></div>
          <canvas class="plane-canvas" id="plane-xz" width="520" height="440"></canvas>
        </div>
      </div>
      <div class="replay-stage" id="replay3d">
        <div class="stage-empty" id="replay3d-empty">3D 初始化中...</div>
      </div>
    </div>
    <aside class="replay-side">
      <div class="replay-controls">
        <button id="play">播放</button>
        <input id="scrub" type="range" min="0" max="${Math.max(0, (d.samples || []).length - 1)}" value="0">
        <div class="replay-control-row">
          <button id="view-home" type="button">重置視角</button>
          <button id="view-top" type="button">俯視</button>
        </div>
      </div>
      <div class="replay-readout kv" style="grid-template-columns:72px 1fr;">
        <div class="key">t</div><div class="val" id="rt">—</div>
        <div class="key">pose</div><div class="val" id="rp">—</div>
        <div class="key">CAN</div><div class="val" id="rc">—</div>
      </div>
      <div class="replay-note">上排三圖追蹤平台中心在 XY / YZ / XZ 平面的軌跡；下方 3D 用同一套幾何重建平台姿態，可拖曳旋轉、滾輪縮放、播放或拖曳時間軸。</div>
    </aside>
  </div>`;
}

function paramsHtml(d) {
  return `<div class="plots">
    <div><div class="panel-title" style="margin-bottom:8px;">Manifest / condition</div>${jsonBlock(d.manifest || {})}</div>
    <div><div class="panel-title" style="margin-bottom:8px;">Summary</div>${jsonBlock(d.summary || {})}</div>
    <div><div class="panel-title" style="margin-bottom:8px;">Stability score</div>${jsonBlock(d.stability || {})}</div>
  </div>`;
}

function rawHtml(r) {
  const files = Object.entries(r.files || {}).filter(([, p]) => p);
  return `<div class="file-links">${files.map(([k, p]) => `<a href="${fileUrl(p)}" target="_blank">${esc(k)}</a>`).join('')}</div>`;
}

async function runOperation(op) {
  const id = state.detail?.run?.id || state.selected;
  if (!id) return;
  const label = op === 'archive' ? '封存' : '刪除';
  const target = op === 'archive' ? 'archive' : 'trash';
  const text = op === 'archive'
    ? `封存 ${id}？\\n\\n它會從 active 面板消失，但檔案會移到 sysid/data/archive。`
    : `刪除 ${id}？\\n\\n這是 soft-delete：檔案會移到 sysid/data/trash，不會永久刪除。`;
  if (!confirm(text)) return;
  const status = $('op-status');
  if (status) status.textContent = `${label}中...`;
  try {
    const res = await fetch(`/api/runs/${encodeURIComponent(id)}/${op}`, { method: 'POST' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `${label}失敗`);
    state.selected = null;
    state.detail = null;
    stopReplay();
    $('detail').innerHTML = `<div class="empty-state">${label}完成：已移到 ${esc(target)}。請從左側選下一筆。</div>`;
    await loadRuns();
  } catch (err) {
    if (status) status.textContent = `${label}失敗：${err.message}`;
  }
}

function setupReplay() {
  const samples = state.detail?.samples || [];
  const scrub = $('scrub');
  const play = $('play');
  const home = $('view-home');
  const top = $('view-top');
  initReplay3d();
  if (!samples.length) { drawReplay(); return; }
  scrub.oninput = () => { state.replayIndex = Number(scrub.value); drawReplay(); };
  play.onclick = () => state.playing ? stopReplay() : startReplay();
  if (home) home.onclick = () => setReplayView('home');
  if (top) top.onclick = () => setReplayView('top');
  drawReplay();
}

function startReplay() {
  state.playing = true;
  $('play').textContent = '暫停';
  const tick = () => {
    if (!state.playing) return;
    const samples = state.detail?.samples || [];
    state.replayIndex = (state.replayIndex + 1) % Math.max(1, samples.length);
    const scrub = $('scrub');
    if (scrub) scrub.value = state.replayIndex;
    drawReplay();
    state.raf = requestAnimationFrame(tick);
  };
  state.raf = requestAnimationFrame(tick);
}

function stopReplay() {
  state.playing = false;
  if (state.raf) cancelAnimationFrame(state.raf);
  state.raf = null;
  const play = $('play');
  if (play) play.textContent = '播放';
}

const DEG = Math.PI / 180;
const kin = window.Kin || {};
const KIN_B = [];
const KIN_P = [];
for (let i = 0; i < 6; i++) {
  const ba = (kin.BASE_ANGLES?.[i] ?? 0) * DEG;
  const pa = (kin.PLATFORM_ANGLES?.[i] ?? 0) * DEG;
  KIN_B.push({ x: (kin.BASE_RADIUS || 152) * Math.cos(ba), y: (kin.BASE_RADIUS || 152) * Math.sin(ba), z: 0 });
  KIN_P.push({ x: (kin.PLATFORM_RADIUS || 103) * Math.cos(pa), y: (kin.PLATFORM_RADIUS || 103) * Math.sin(pa), z: 0 });
}

function bounds(vals, pad = 1) {
  const finite = vals.filter(Number.isFinite);
  if (!finite.length) return [-1, 1];
  let lo = Math.min(...finite), hi = Math.max(...finite);
  if (Math.abs(hi - lo) < 1e-6) { lo -= pad; hi += pad; }
  const m = (hi - lo) * 0.12 + pad;
  return [lo - m, hi + m];
}

function poseRotation(pose) {
  const roll = Number(pose?.[3] || 0), pitch = Number(pose?.[4] || 0), yaw = Number(pose?.[5] || 0);
  const cr = Math.cos(roll * DEG), sr = Math.sin(roll * DEG);
  const cp = Math.cos(pitch * DEG), sp = Math.sin(pitch * DEG);
  const cy = Math.cos(yaw * DEG), sy = Math.sin(yaw * DEG);
  return [
    [cy * cp, cy * sp * sr - sy * cr, cy * sp * cr + sy * sr],
    [sy * cp, sy * sp * sr + cy * cr, sy * sp * cr - cy * sr],
    [-sp, cp * sr, cp * cr],
  ];
}

function poseQ(pose) {
  const R = poseRotation(pose);
  const x = Number(pose?.[0] || 0), y = Number(pose?.[1] || 0), z = Number(pose?.[2] || kin.NEUTRAL_Z || 105);
  return KIN_P.map(p => ({
    x: R[0][0] * p.x + R[0][1] * p.y + R[0][2] * p.z + x,
    y: R[1][0] * p.x + R[1][1] * p.y + R[1][2] * p.z + y,
    z: R[2][0] * p.x + R[2][1] * p.y + R[2][2] * p.z + z,
  }));
}

function computeAPlain(angles) {
  return angles.map((ang, i) => {
    const a = Number(ang || 0) * DEG;
    const th = (kin.MOTOR_PLANE_ANGLE?.[i] ?? 0) * DEG;
    return {
      x: (kin.LOWER_LEG || 65) * Math.cos(a) * Math.cos(th) + KIN_B[i].x,
      y: (kin.LOWER_LEG || 65) * Math.cos(a) * Math.sin(th) + KIN_B[i].y,
      z: (kin.LOWER_LEG || 65) * Math.sin(a) + KIN_B[i].z,
    };
  });
}

function modelFromSample(sample) {
  const pose = sample?.pose || [0, 0, kin.NEUTRAL_Z || 105, 0, 0, 0];
  const angles = Array.isArray(sample?.a) && sample.a.length === 6
    ? sample.a.map(Number)
    : (kin.ik?.(pose)?.angles || new Array(6).fill(90));
  return { pose, B: KIN_B, A: computeAPlain(angles), Q: poseQ(pose) };
}

function axisValue(point, axis) {
  if (axis === 'x') return Number(point.x);
  if (axis === 'y') return Number(point.y);
  return Number(point.z);
}

function poseAxis(pose, axis) {
  const map = { x: 0, y: 1, z: 2 };
  return Number(pose?.[map[axis]]);
}

function fitCanvas(canvas) {
  const rect = canvas.getBoundingClientRect();
  const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  const w = Math.max(1, Math.round(rect.width));
  const h = Math.max(1, Math.round(rect.height));
  if (canvas.width !== Math.round(w * dpr) || canvas.height !== Math.round(h * dpr)) {
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
  }
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { ctx, W: w, H: h };
}

function drawPlane(spec, samples) {
  const canvas = $(spec.id);
  if (!canvas) return;
  const { ctx, W, H } = fitCanvas(canvas);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#050707';
  ctx.fillRect(0, 0, W, H);
  ctx.font = '11px SF Mono, Consolas, monospace';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (!samples.length) {
    ctx.fillStyle = '#6f797c';
    ctx.fillText('no samples', 20, 30);
    return;
  }

  const idx = Math.max(0, Math.min(samples.length - 1, state.replayIndex));
  const model = modelFromSample(samples[idx]);
  const poses = samples.map(s => s.pose || []).filter(p => p.length >= 3);
  const modelPts = [...model.B, ...model.A, ...model.Q];
  const hVals = [
    ...poses.map(p => poseAxis(p, spec.h)),
    ...modelPts.map(p => axisValue(p, spec.h)),
  ];
  const vVals = [
    ...poses.map(p => poseAxis(p, spec.v)),
    ...modelPts.map(p => axisValue(p, spec.v)),
  ];
  const [h0, h1] = bounds(hVals, spec.v === 'z' ? 16 : 12);
  const [v0, v1] = bounds(vVals, spec.v === 'z' ? 16 : 12);
  const pad = { l: 34, r: 16, t: 18, b: 30 };
  const pw = Math.max(1, W - pad.l - pad.r);
  const ph = Math.max(1, H - pad.t - pad.b);
  const scale = Math.min(pw / Math.max(1e-6, h1 - h0), ph / Math.max(1e-6, v1 - v0));
  const midH = (h0 + h1) / 2;
  const midV = (v0 + v1) / 2;
  const cx = pad.l + pw / 2;
  const cy = pad.t + ph / 2;
  const project = (h, v) => [cx + (h - midH) * scale, cy - (v - midV) * scale];
  const pp = (point) => project(axisValue(point, spec.h), axisValue(point, spec.v));
  const cp = (pose) => project(poseAxis(pose, spec.h), poseAxis(pose, spec.v));

  ctx.strokeStyle = '#172022';
  ctx.lineWidth = 1;
  for (let i = -4; i <= 4; i++) {
    const x = cx + i * pw / 8;
    const y = cy + i * ph / 8;
    ctx.beginPath(); ctx.moveTo(x, pad.t); ctx.lineTo(x, H - pad.b); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
  }
  ctx.strokeStyle = '#2b3032';
  ctx.strokeRect(pad.l, pad.t, pw, ph);
  ctx.fillStyle = '#6f797c';
  ctx.fillText(spec.hLabel, W - pad.r - 54, H - 10);
  ctx.save();
  ctx.translate(12, pad.t + 48);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText(spec.vLabel, 0, 0);
  ctx.restore();

  function drawPoly(points, fill, stroke, alpha = 1) {
    if (!points.length) return;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    points.forEach((point, i) => {
      const [x, y] = pp(point);
      if (i) ctx.lineTo(x, y); else ctx.moveTo(x, y);
    });
    ctx.closePath();
    ctx.fillStyle = fill;
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 1.2;
    ctx.fill();
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  function drawSegment(a, b, color, width = 1, alpha = 1) {
    const [x0p, y0p] = pp(a);
    const [x1p, y1p] = pp(b);
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(x0p, y0p);
    ctx.lineTo(x1p, y1p);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  function drawPoint(point, color, r = 3, alpha = 1) {
    const [x, y] = pp(point);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  drawPoly(model.B, 'rgba(94, 104, 101, 0.12)', '#404849', spec.title === 'XY' ? 1 : 0.55);
  for (let i = 0; i < 6; i++) {
    drawSegment(model.B[i], model.A[i], '#4b7890', 1.2, 0.72);
    drawSegment(model.A[i], model.Q[i], '#d6853e', 1.2, 0.82);
  }
  drawPoly(model.Q, 'rgba(90, 184, 150, 0.22)', '#65d5b0', 1);
  model.B.forEach(p => drawPoint(p, '#9b3030', 2.6, 0.85));
  model.A.forEach(p => drawPoint(p, '#d0a321', 2.3, 0.9));
  model.Q.forEach(p => drawPoint(p, '#587c9a', 2.7, 0.9));

  const step = Math.max(1, Math.ceil(poses.length / 260));
  ctx.beginPath();
  for (let i = 0; i < poses.length; i += step) {
    const [x, y] = cp(poses[i]);
    if (i) ctx.lineTo(x, y); else ctx.moveTo(x, y);
  }
  ctx.strokeStyle = 'rgba(236,132,66,.18)';
  ctx.lineWidth = 1;
  ctx.stroke();

  const tailStart = Math.max(0, idx - 120);
  for (let i = tailStart + 1; i <= idx; i++) {
    const [x0p, y0p] = cp(poses[i - 1]);
    const [x1p, y1p] = cp(poses[i]);
    const a = 0.12 + 0.76 * ((i - tailStart) / Math.max(1, idx - tailStart));
    ctx.strokeStyle = `rgba(92,199,242,${a.toFixed(3)})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x0p, y0p);
    ctx.lineTo(x1p, y1p);
    ctx.stroke();
  }

  const [px, py] = cp(model.pose);
  const glow = ctx.createRadialGradient(px, py, 1, px, py, 24);
  glow.addColorStop(0, 'rgba(92,199,242,.9)');
  glow.addColorStop(1, 'rgba(92,199,242,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(px, py, 24, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#5cc7f2';
  ctx.strokeStyle = '#d9fbff';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(px, py, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
}

function makeThreeVec(p) {
  return new THREE.Vector3(Number(p.x), Number(p.y), Number(p.z));
}

function makeLineObject(scene, color, opacity = 1) {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute([0, 0, 0, 0, 0, 0], 3));
  const mat = new THREE.LineBasicMaterial({ color, transparent: opacity < 1, opacity });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  return line;
}

function setLineObject(line, a, b) {
  const arr = line.geometry.attributes.position.array;
  arr[0] = a.x; arr[1] = a.y; arr[2] = a.z;
  arr[3] = b.x; arr[4] = b.y; arr[5] = b.z;
  line.geometry.attributes.position.needsUpdate = true;
}

function makeSphereObject(scene, color, radius) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(radius, 14, 10),
    new THREE.MeshPhongMaterial({ color })
  );
  scene.add(mesh);
  return mesh;
}

function updatePlateGeometry(geo, points) {
  const arr = geo.attributes.position.array;
  let cx = 0, cy = 0, cz = 0;
  points.forEach(p => { cx += p.x; cy += p.y; cz += p.z; });
  cx /= points.length; cy /= points.length; cz /= points.length;
  for (let i = 0; i < 6; i++) {
    const j = (i + 1) % 6;
    const k = i * 9;
    arr[k] = cx; arr[k + 1] = cy; arr[k + 2] = cz;
    arr[k + 3] = points[i].x; arr[k + 4] = points[i].y; arr[k + 5] = points[i].z;
    arr[k + 6] = points[j].x; arr[k + 7] = points[j].y; arr[k + 8] = points[j].z;
  }
  geo.attributes.position.needsUpdate = true;
  geo.computeVertexNormals();
}

function initReplay3d() {
  if (state.replay3d) return;
  const host = $('replay3d');
  if (!host) return;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050707);
  const camera = new THREE.PerspectiveCamera(48, 1, 1, 1600);
  camera.up.set(0, 0, 1);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
  host.appendChild(renderer.domElement);
  const labelRenderer = new CSS2DRenderer();
  labelRenderer.domElement.style.position = 'absolute';
  labelRenderer.domElement.style.inset = '0';
  labelRenderer.domElement.style.pointerEvents = 'none';
  host.appendChild(labelRenderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0, kin.NEUTRAL_Z || 105);
  controls.enableDamping = false;
  controls.addEventListener('change', () => renderReplay3d(false));

  scene.add(new THREE.AmbientLight(0xffffff, 0.65));
  const key = new THREE.DirectionalLight(0xffffff, 0.85);
  key.position.set(220, -260, 320);
  scene.add(key);
  const fill = new THREE.DirectionalLight(0x7fd6ff, 0.28);
  fill.position.set(-240, 120, 190);
  scene.add(fill);

  const grid = new THREE.GridHelper(420, 21, 0x263034, 0x151d20);
  grid.rotation.x = Math.PI / 2;
  scene.add(grid);

  const baseShape = new THREE.Shape();
  baseShape.moveTo(KIN_B[0].x, KIN_B[0].y);
  for (let i = 1; i < 6; i++) baseShape.lineTo(KIN_B[i].x, KIN_B[i].y);
  baseShape.closePath();
  const baseMesh = new THREE.Mesh(
    new THREE.ShapeGeometry(baseShape),
    new THREE.MeshPhongMaterial({ color: 0x5e6865, transparent: true, opacity: 0.22, side: THREE.DoubleSide })
  );
  scene.add(baseMesh);

  const platformGeo = new THREE.BufferGeometry();
  platformGeo.setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(54), 3));
  const platformMesh = new THREE.Mesh(
    platformGeo,
    new THREE.MeshPhongMaterial({ color: 0x4cc49b, transparent: true, opacity: 0.34, side: THREE.DoubleSide })
  );
  scene.add(platformMesh);

  const baseDots = [], motorDots = [], platformDots = [], lowerLines = [], upperLines = [], labels = [];
  for (let i = 0; i < 6; i++) {
    baseDots.push(makeSphereObject(scene, 0xa53b3b, 4.8));
    motorDots.push(makeSphereObject(scene, 0xd4a62a, 4.1));
    platformDots.push(makeSphereObject(scene, 0x547d9f, 4.5));
    lowerLines.push(makeLineObject(scene, 0x4b8aa8, 0.86));
    upperLines.push(makeLineObject(scene, 0xd6853e, 0.92));
    const div = document.createElement('div');
    div.className = 'motor-label';
    div.textContent = `M${i + 1}`;
    const label = new CSS2DObject(div);
    scene.add(label);
    labels.push(label);
  }

  const centerDot = makeSphereObject(scene, 0x5cc7f2, 6);
  const trailGeo = new THREE.BufferGeometry();
  trailGeo.setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(180 * 3), 3));
  trailGeo.setDrawRange(0, 0);
  const trail = new THREE.Line(
    trailGeo,
    new THREE.LineBasicMaterial({ color: 0x5cc7f2, transparent: true, opacity: 0.72 })
  );
  scene.add(trail);

  const ro = new ResizeObserver(fitReplay3d);
  ro.observe(host);
  state.replay3d = { host, scene, camera, renderer, labelRenderer, controls, ro, platformGeo, platformMesh,
    baseDots, motorDots, platformDots, lowerLines, upperLines, labels, centerDot, trail };
  setReplayView('home');
  const empty = $('replay3d-empty');
  if (empty) empty.remove();
  fitReplay3d();
}

function fitReplay3d() {
  const r = state.replay3d;
  if (!r) return;
  const rect = r.host.getBoundingClientRect();
  const w = Math.max(1, Math.round(rect.width));
  const h = Math.max(1, Math.round(rect.height));
  r.renderer.setSize(w, h, false);
  r.labelRenderer.setSize(w, h);
  r.camera.aspect = w / h;
  r.camera.updateProjectionMatrix();
  renderReplay3d();
}

function setReplayView(view) {
  const r = state.replay3d;
  if (!r) return;
  if (view === 'top') {
    r.camera.position.set(0, 0, 560);
    r.controls.target.set(0, 0, kin.NEUTRAL_Z || 105);
  } else {
    r.camera.position.set(310, -330, 260);
    r.controls.target.set(0, 0, kin.NEUTRAL_Z || 105);
  }
  r.controls.update();
  renderReplay3d();
}

function renderReplay3d(updateControls = true) {
  const r = state.replay3d;
  if (!r) return;
  if (updateControls) r.controls.update();
  r.renderer.render(r.scene, r.camera);
  r.labelRenderer.render(r.scene, r.camera);
}

function destroyReplay3d() {
  const r = state.replay3d;
  if (!r) return;
  r.ro?.disconnect();
  r.controls?.dispose();
  r.renderer?.dispose();
  if (r.renderer?.domElement?.parentNode) r.renderer.domElement.parentNode.removeChild(r.renderer.domElement);
  if (r.labelRenderer?.domElement?.parentNode) r.labelRenderer.domElement.parentNode.removeChild(r.labelRenderer.domElement);
  state.replay3d = null;
}

function updateReplay3d(sample, samples, idx) {
  const r = state.replay3d;
  if (!r || !sample) return;
  const model = modelFromSample(sample);
  const Bv = model.B.map(makeThreeVec);
  const Av = model.A.map(makeThreeVec);
  const Qv = model.Q.map(makeThreeVec);
  updatePlateGeometry(r.platformGeo, Qv);
  for (let i = 0; i < 6; i++) {
    r.baseDots[i].position.copy(Bv[i]);
    r.motorDots[i].position.copy(Av[i]);
    r.platformDots[i].position.copy(Qv[i]);
    r.labels[i].position.copy(Qv[i]).add(new THREE.Vector3(0, 0, 12));
    setLineObject(r.lowerLines[i], Bv[i], Av[i]);
    setLineObject(r.upperLines[i], Av[i], Qv[i]);
  }
  const center = new THREE.Vector3(
    Number(model.pose?.[0] || 0),
    Number(model.pose?.[1] || 0),
    Number(model.pose?.[2] || kin.NEUTRAL_Z || 105)
  );
  r.centerDot.position.copy(center);

  const arr = r.trail.geometry.attributes.position.array;
  const tail = samples.slice(Math.max(0, idx - 179), idx + 1);
  tail.forEach((s, i) => {
    const p = s.pose || [];
    arr[i * 3] = Number(p[0] || 0);
    arr[i * 3 + 1] = Number(p[1] || 0);
    arr[i * 3 + 2] = Number(p[2] || kin.NEUTRAL_Z || 105);
  });
  r.trail.geometry.setDrawRange(0, tail.length);
  r.trail.geometry.attributes.position.needsUpdate = true;
  renderReplay3d();
}

function drawReplay() {
  const samples = state.detail?.samples || [];
  const planes = [
    { id: 'plane-xy', h: 'x', v: 'y', hLabel: 'X mm', vLabel: 'Y mm', title: 'XY' },
    { id: 'plane-yz', h: 'y', v: 'z', hLabel: 'Y mm', vLabel: 'Z mm', title: 'YZ' },
    { id: 'plane-xz', h: 'x', v: 'z', hLabel: 'X mm', vLabel: 'Z mm', title: 'XZ' },
  ];
  planes.forEach(spec => drawPlane(spec, samples));
  if (!samples.length) {
    const rt = $('rt'), rp = $('rp'), rc = $('rc');
    if (rt) rt.textContent = '—';
    if (rp) rp.textContent = 'no replay samples';
    if (rc) rc.textContent = '—';
    return;
  }
  const idx = Math.max(0, Math.min(samples.length - 1, state.replayIndex));
  const s = samples[idx], p = s.pose || [];
  const timeText = `${fmt.n(Number(s.t) / 1000, 2)}s / ${fmt.n(Number(samples.at(-1)?.t || 0) / 1000, 2)}s`;
  const rt = $('rt'), rp = $('rp'), rc = $('rc');
  if (rt) rt.textContent = timeText;
  if (rp) rp.textContent = `X ${fmt.n(p[0], 1)} Y ${fmt.n(p[1], 1)} Z ${fmt.n(p[2], 1)} R ${fmt.n(p[3], 1)} P ${fmt.n(p[4], 1)} Y ${fmt.n(p[5], 1)}`;
  if (rc) rc.textContent = `ok ${s.ok ?? '—'} · hz ${fmt.n(s.lhz, 0)} · ef ${s.ef ?? '—'} · drop ${s.rxDrop ?? 0}`;
  updateReplay3d(s, samples, idx);
}

$('refresh').onclick = () => loadRuns(state.selected);
$('search').oninput = applyFilter;
$('profile').onchange = applyFilter;
window.RunPanel = { state, renderTab, loadRuns, selectRun };
loadRuns().catch(err => {
  $('run-list').innerHTML = `<div class="empty-state">讀取失敗：${esc(err.message)}</div>`;
});
</script>
