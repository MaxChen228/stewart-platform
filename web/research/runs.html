<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stewart 執行紀錄</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared/app-ui.css">
<style>
.wrap { width:100%; max-width:none; margin-left:auto; margin-right:auto; }
.run-layout, .detail, .panel.hero, .metric-grid, .tabs, .tab-body { min-width:0; }
.run-layout { display:grid; grid-template-columns:minmax(320px,380px) minmax(0,1fr); gap:14px; align-items:start; }
.panel { border:1px solid var(--borderBase); border-radius:4px; background:var(--surface); overflow:hidden; }
.panel-head { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px 14px; border-bottom:1px solid var(--borderL); }
.panel-title { font-family:var(--font-mono); font-weight:500; font-size:12px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink); }
.toolbar { display:flex; flex-wrap:wrap; gap:8px; padding:12px 14px; border-bottom:1px solid var(--borderL); }
.toolbar input, .toolbar select {
  min-width:0; padding:9px 10px; border:1px solid var(--borderBase); border-radius:2px;
  background:var(--surface); color:var(--ink); font-family:var(--font-mono);
}
.toolbar input { flex:1 1 160px; }
.toolbar select { flex:0 0 190px; }
.compare-note {
  padding:8px 14px;
  border-bottom:1px solid var(--borderL);
  color:var(--sub);
  font-size:12px;
  line-height:1.45;
}
.run-list { max-height:calc(100vh - 206px); overflow:auto; }
.run-item { width:100%; display:block; text-align:left; padding:12px 14px; border:0; border-bottom:1px solid var(--borderL);
  border-radius:0; background:transparent; color:var(--ink); cursor:pointer; font:inherit; }
.run-item:hover { background:var(--bg); }
.run-item.sel { background:#eef3f6; box-shadow:inset 3px 0 0 var(--contra); }
.run-name { font-family:var(--font-mono); font-weight:700; line-height:1.35; color:var(--ink); word-break:break-word; }
.run-meta { margin-top:8px; display:flex; flex-wrap:wrap; gap:6px; color:var(--sub); font-size:11px; }
.pill { display:inline-flex; align-items:center; min-height:22px; padding:2px 7px; border:1px solid var(--borderBase); border-radius:999px; color:var(--sub); background:var(--bg); font-family:var(--font-mono); }
.pill.good { border-color:var(--contra); color:var(--contra); }
.pill.warn { border-color:var(--dual); color:var(--dual); }
.pill.bad { border-color:var(--dev); color:var(--dev); }
.detail { display:flex; flex-direction:column; gap:16px; }
.hero { padding:14px 16px; }
.hero h1 { font-size:17px; line-height:1.35; margin-bottom:8px; word-break:break-word; letter-spacing:0; }
.hero-sub { color:var(--sub); font-size:12px; line-height:1.55; }
.run-actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
.run-actions button { flex:0 0 auto; padding:7px 12px; font-size:12px; border-radius:12px; }
.run-actions button.archive { color:var(--dual); border-color:var(--dual); background:transparent; }
.run-actions button.delete { color:var(--dev); border-color:var(--dev); background:transparent; }
.notice { margin-top:10px; color:var(--sub); font-size:12px; min-height:18px; }
.metric-grid { display:grid; grid-template-columns:repeat(5,minmax(120px,1fr)); gap:10px; padding:14px; }
.metric { border:1px solid var(--borderL); border-radius:3px; background:var(--bg); padding:12px; min-height:78px; }
.metric .k { color:var(--sub); font-family:var(--font-mono); font-size:11px; letter-spacing:.08em; margin-bottom:8px; }
.metric .v { font-family:var(--font-mono); font-size:22px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.metric .s { margin-top:5px; color:var(--sub); font-size:11px; line-height:1.4; }
.tabs { display:flex; gap:8px; padding:10px 12px; border-bottom:1px solid var(--borderL); }
.tabs button { flex:0 0 auto; padding:7px 12px; font-size:12px; border-radius:12px; }
.tabs button.active { background:var(--contra); border-color:transparent; color:#fff; }
.tab-body { padding:12px; }
.plots { display:grid; grid-template-columns:1fr; gap:14px; }
.plot-card { border:1px solid var(--borderL); border-radius:4px; overflow:hidden; background:#050505; }
.plot-card .cap { padding:9px 11px; border-bottom:1px solid var(--borderL); color:var(--sub); font-size:12px; background:var(--surface); }
.plot-card img { width:100%; display:block; background:#050505; }
.replay-grid { display:grid; grid-template-columns:minmax(0,1fr) minmax(260px,300px); gap:12px; align-items:start; }
.replay-main { display:grid; gap:12px; min-width:0; }
.plane-row { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; }
.plane-card, .replay-stage { border:1px solid var(--borderBase); border-radius:4px; background:var(--surface); overflow:hidden; min-width:0; }
.plane-cap { display:flex; justify-content:space-between; gap:10px; padding:8px 10px; border-bottom:1px solid var(--borderL); color:var(--ink); font-size:11px; letter-spacing:.08em; }
.plane-cap span:last-child { color:var(--sub); letter-spacing:0; white-space:nowrap; }
.plane-canvas { width:100%; aspect-ratio:1.18/1; height:auto; min-height:210px; background:var(--surface); display:block; }
.plane-zoom { display:flex; align-items:center; gap:8px; padding:7px 10px; border-top:1px solid var(--borderL); }
.plane-zoom span {
  flex:0 0 auto; font-family:var(--font-mono); font-size:10px; letter-spacing:.08em;
  text-transform:uppercase; color:var(--sub);
}
.plane-zoom input { flex:1 1 auto; min-width:0; }
.plane-zoom output {
  flex:0 0 34px; text-align:right; font-family:var(--font-mono); font-size:10px;
  color:var(--inkLight); font-variant-numeric:tabular-nums;
}
.replay-stage { aspect-ratio:1.35/1; position:relative; }
.replay-stage canvas { width:100% !important; height:100% !important; display:block; }
.replay-stage .stage-empty { position:absolute; inset:0; display:grid; place-items:center; color:#777; font-size:12px; pointer-events:none; }
.replay-side { display:flex; flex-direction:column; gap:10px; }
.replay-controls { border:1px solid var(--borderBase); border-radius:4px; background:var(--surface); padding:12px; }
.replay-control-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
.replay-control-title {
  font-family:var(--font-mono); font-size:11px; letter-spacing:.08em;
  text-transform:uppercase; color:var(--ink);
}
.replay-time {
  font-family:var(--font-mono); font-size:11px; color:var(--sub);
  font-variant-numeric:tabular-nums; white-space:nowrap;
}
.replay-primary {
  width:100%; min-height:42px; padding:8px 12px; border-radius:14px;
  font-size:13px; letter-spacing:.08em;
}
.replay-scrub-wrap { margin-top:10px; }
.replay-scrub-meta {
  display:flex; align-items:center; justify-content:space-between; gap:8px;
  margin-top:4px; font-family:var(--font-mono); font-size:10px;
  color:var(--sub); font-variant-numeric:tabular-nums;
}
.control-section { margin-top:14px; }
.control-label {
  margin-bottom:7px; font-family:var(--font-mono); font-size:10px;
  letter-spacing:.08em; text-transform:uppercase; color:var(--sub);
}
.speed-row { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:6px; }
.speed-row button,
.view-row button {
  min-width:0; padding:7px 6px; border-radius:12px; font-size:11px;
}
.speed-row button.active { background:var(--contra); border-color:transparent; color:#fff; }
.view-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.replay-side input[type="range"] { width:100%; }
.trace-toggle {
  display:flex; align-items:center; gap:8px; margin-top:12px;
  padding:8px 10px; border:1px solid var(--borderL); border-radius:12px;
  font-family:var(--font-mono); font-size:11px; color:var(--ink);
  background:var(--bg);
}
.trace-toggle input { width:auto; }
.replay-readout { border:1px solid var(--borderBase); border-radius:4px; background:var(--bg); padding:12px; }
.replay-readout.kv { grid-template-columns:52px minmax(0,1fr) !important; }
.motor-label {
  padding:3px 5px; border:1px solid rgba(255,255,255,.22); border-radius:4px;
  background:rgba(10,12,13,.72); color:#d7dcdd; font-size:11px; pointer-events:none;
}
.kv { display:grid; grid-template-columns:170px minmax(0,1fr); gap:8px 12px; align-items:start; font-size:12px; }
.kv .key { color:var(--sub); }
.kv .val { color:var(--ink); word-break:break-word; }
.file-links { display:flex; flex-wrap:wrap; gap:8px; }
.file-links a { display:inline-flex; padding:7px 9px; border:1px solid var(--borderBase); border-radius:12px; color:var(--contra); background:transparent; font-size:12px; font-family:var(--font-mono); }
@media (max-width: 900px) {
  .run-layout, .replay-grid, .plane-row { grid-template-columns:1fr; }
  .run-list { max-height:360px; }
  .metric-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
  .plane-canvas { min-height:240px; }
}
</style>
</head>
<body class="app-page">
<div class="wrap">
  <div class="app-top">
    <div class="app-top-left">
      <span class="app-title">執行紀錄</span>
    </div>
    <nav class="app-nav" data-app-nav aria-label="Main navigation"></nav>
  </div>
  <div class="app-heading">執行紀錄</div>
  <div class="app-hint">每筆 session 的波形、軌跡回放、參數、摘要與原始檔集中查閱。</div>

  <div class="run-layout">
    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">RUNS</div>
        <button id="refresh" style="flex:0 0 auto;padding:8px 12px;font-size:12px;">刷新</button>
      </div>
      <div class="toolbar">
        <input id="search" placeholder="搜尋 run / program / 條件">
        <select id="program-filter"><option value="">全部 Program</option></select>
      </div>
      <div class="compare-note" id="compare-note">選一個 Program 後才進入同題比較；全部 Program 只用來瀏覽資料。</div>
      <div class="run-list" id="run-list"><div class="empty-state">讀取中...</div></div>
    </section>

    <main class="detail" id="detail">
      <div class="empty-state">選一筆執行紀錄，這裡會展開完整細節。</div>
    </main>
  </div>
</div>

<script src="/sysid/kin.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
import {
  StewartStyle,
  createStewartModel,
  computeActuatorPoints,
  platformPointsFromPose,
  createStewartRig,
} from '/shared/stewart-renderer.js';
import * as motionLib from '/shared/motion-library.js';
import {
  normalizeBlocks,
  workspaceProgramMeta,
} from '/shared/workspace-core.js';

const $ = (id) => document.getElementById(id);
const state = {
  runs: [],
  filtered: [],
  selected: null,
  detail: null,
  tab: 'overview',
  replayIndex: 0,
  playing: false,
  playbackRate: 1,
  playStartedAt: 0,
  playStartTimeMs: 0,
  raf: null,
  replay3d: null,
  draftProgram: null,
  savedPrograms: [],
  planeZoom: { xy: 1, yz: 1, xz: 1 },
  showReplayTrace: true,
};
function present(v) { return v !== null && v !== undefined && v !== ''; }
const fmt = {
  n(v, d = 2) { return present(v) && Number.isFinite(Number(v)) ? Number(v).toFixed(d) : '—'; },
  int(v) { return present(v) && Number.isFinite(Number(v)) ? String(Math.round(Number(v))) : '—'; },
  pct(v) { return present(v) && Number.isFinite(Number(v)) ? `${(Number(v) * 100).toFixed(1)}%` : '—'; },
  time(s) { return present(s) && Number.isFinite(Number(s)) ? `${Number(s).toFixed(1)}s` : '—'; },
  date(x) { if (!x) return '—'; const d = new Date(x); return Number.isNaN(d.getTime()) ? x : d.toLocaleString(); },
};

function esc(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}
function fileUrl(p) { return `/api/run-file?p=${encodeURIComponent(p)}`; }
function jsonBlock(x) { return `<pre>${esc(JSON.stringify(x ?? {}, null, 2))}</pre>`; }
function verdictClass(v) {
  if (v === 'no-hard-fail') return 'good';
  if (v === 'reject') return 'bad';
  return 'warn';
}
function shortRunName(r) {
  return r.name && r.name !== 'capture' ? r.name : r.id.replace(/_\d{4}-\d{2}-\d{2}T.*/, '');
}

async function loadRuns(selectId = null) {
  const box = $('run-list');
  box.innerHTML = '<div class="empty-state">讀取中...</div>';
  const [res, cfgRes] = await Promise.all([
    fetch('/api/runs'),
    fetch('/api/platform-config').catch(() => null),
  ]);
  const data = await res.json();
  const cfg = cfgRes && cfgRes.ok ? await cfgRes.json().catch(() => null) : null;
  const draftBlocks = normalizeBlocks(cfg || {}, motionLib.MOTIONS, motionLib);
  state.draftProgram = workspaceProgramMeta({
    blocks: draftBlocks,
    name: 'Scratch Draft',
    motions: motionLib.MOTIONS,
    motionLib,
  });
  state.savedPrograms = Array.isArray(cfg?.uiState?.workspace?.programs)
    ? cfg.uiState.workspace.programs
        .filter((p) => p && typeof p.id === 'string')
        .map((p) => ({
          id: p.id,
          name: typeof p.name === 'string' && p.name.trim() ? p.name.trim() : p.id,
          hash: typeof p.hash === 'string' ? p.hash : null,
        }))
    : [];
  state.runs = data.runs || [];
  syncPrograms();
  applyFilter();
  const pick = selectId || state.selected || state.filtered[0]?.id;
  if (pick) await selectRun(pick);
}

function runProgram(r) {
  const p = r?.program || null;
  const label = `${r?.name || r?.id || ''}`;
  if (!p) {
    const scratchHash = label.match(/^scratch[_-]([a-f0-9]{8})[_-]workspace/i)?.[1];
    if (scratchHash) return { id: `scratch_${scratchHash}`, name: 'Scratch Draft', hash: scratchHash, draft: true };
    if (state.draftProgram && /^scratch(?:_|-)?workspace/i.test(label)) return state.draftProgram;
  }
  if (!p) return null;
  if (p.draft) {
    return {
      key: p.hash || p.id || 'scratch',
      label: p.name || 'Scratch Draft',
      draft: true,
    };
  }
  const saved = state.savedPrograms.find((program) =>
    (p.id && program.id === p.id) ||
    (p.hash && program.hash && program.hash === p.hash)
  );
  if (!saved) return null;
  return {
    key: saved.hash || saved.id,
    label: saved.name || saved.id,
  };
}

function programLabel(r) {
  return runProgram(r)?.label || '未歸類';
}

function programKey(r) {
  return runProgram(r)?.key || '__unclassified__';
}

function syncPrograms() {
  const cur = $('program-filter').value;
  const map = new Map();
  for (const r of state.runs) {
    const key = programKey(r);
    const current = map.get(key) || { label: programLabel(r), count: 0 };
    current.count += 1;
    map.set(key, current);
  }
  const items = [...map.entries()].sort((a, b) => a[1].label.localeCompare(b[1].label));
  $('program-filter').innerHTML = `<option value="">全部 Program (${state.runs.length})</option>` +
    items.map(([k, item]) => `<option value="${esc(k)}">${esc(item.label)} (${item.count})</option>`).join('');
  $('program-filter').value = map.has(cur) ? cur : '';
}

function applyFilter() {
  const q = $('search').value.trim().toLowerCase();
  const selectedProgram = $('program-filter').value;
  state.filtered = state.runs.filter(r => {
    const prog = runProgram(r);
    const hay = `${r.id} ${r.name} ${programLabel(r)} ${prog?.key || ''} ${r.profile || ''} ${JSON.stringify(r.condition || {})}`.toLowerCase();
    return (!selectedProgram || programKey(r) === selectedProgram) && (!q || hay.includes(q));
  });
  if (selectedProgram) {
    state.filtered.sort((a, b) => {
      return Number(new Date(b.wallClock || 0)) - Number(new Date(a.wallClock || 0));
    });
    const label = state.filtered[0] ? programLabel(state.filtered[0]) : $('program-filter').selectedOptions[0]?.textContent;
    $('compare-note').textContent = `${label || 'Program'}：依時間瀏覽，同一 program 內看 waveform features 與 phase 差異。`;
  } else {
    $('compare-note').textContent = '全部 Program 只用來瀏覽資料；不要把不同 program 的 run 壓成單一數字比較。';
  }
  renderList();
}

function renderList() {
  const box = $('run-list');
  if (!state.filtered.length) {
    box.innerHTML = '<div class="empty-state">沒有符合條件的紀錄。</div>';
    return;
  }
  box.innerHTML = state.filtered.map(r => {
    const health = r.health || {};
    const features = r.features || {};
    const can = Number.isFinite(Number(health.rxDropPerS)) ? `${fmt.n(health.rxDropPerS, 1)} drop/s` :
                Number.isFinite(Number(health.rxDropSum)) ? `drop ${fmt.int(health.rxDropSum)}` : 'CAN —';
    return `<button class="run-item ${state.selected === r.id ? 'sel' : ''}" data-id="${esc(r.id)}">
      <div class="run-name">${esc(shortRunName(r))}</div>
      <div class="run-meta">
        <span class="pill ${verdictClass(r.verdict)}">${esc(r.verdict || 'eval')}</span>
        <span class="pill">step ${fmt.n(features.maxStepDeg, 2)}°</span>
        <span class="pill">cross ${fmt.n(features.crossPeak, 2)}</span>
        <span class="pill">worst ${esc(features.worstMotor || '—')}</span>
        <span class="pill">${esc(programLabel(r))}</span>
        <span class="pill">${fmt.time(r.durationS)}</span>
        <span class="pill">${fmt.int(r.samples)} samples</span>
        <span class="pill">${esc(can)}</span>
      </div>
      <div class="run-meta"><span>${esc(fmt.date(r.wallClock))}</span></div>
    </button>`;
  }).join('');
  box.querySelectorAll('.run-item').forEach(btn => btn.onclick = () => selectRun(btn.dataset.id));
}

async function selectRun(id) {
  state.selected = id;
  state.tab = 'overview';
  state.replayIndex = 0;
  stopReplay();
  renderList();
  $('detail').innerHTML = '<div class="empty-state">讀取細節...</div>';
  const res = await fetch(`/api/runs/${encodeURIComponent(id)}`);
  state.detail = await res.json();
  renderDetail();
}

function metric(label, value, sub = '') {
  return `<div class="metric"><div class="k">${esc(label)}</div><div class="v">${esc(value)}</div>${sub ? `<div class="s">${esc(sub)}</div>` : ''}</div>`;
}

function renderDetail() {
  const d = state.detail;
  const r = d.run || {};
  const ev = d.evaluation || {};
  const cond = d.manifest?.condition || r.condition || {};
  const health = r.health || {};
  $('detail').innerHTML = `
    <section class="panel hero">
      <h1>${esc(r.id || state.selected)}</h1>
      <div class="hero-sub">
        ${esc(fmt.date(r.wallClock))} · ${esc(programLabel(r))} · ${fmt.int(r.samples)} samples · ${fmt.time(r.durationS)}
      </div>
      <div class="run-meta" style="margin-top:12px;">
        <span class="pill ${verdictClass(r.verdict || ev.quality?.verdict)}">${esc(r.verdict || ev.quality?.verdict || 'eval')}</span>
        <span class="pill">program ${esc(programLabel(r))}</span>
        <span class="pill">PID ${esc((cond.pid || d.manifest?.latest?.pid || []).join?.('/') || '—')}</span>
        <span class="pill">CAN ${fmt.n(health.rxDropPerS, 1)} drop/s</span>
      </div>
      <div class="run-actions">
        <button class="archive" id="archive-run">封存</button>
        <button class="delete" id="delete-run">刪除</button>
      </div>
      <div class="notice" id="op-status"></div>
    </section>

    <section class="panel">
      <div class="metric-grid">
        ${metric('VERDICT', r.verdict || ev.quality?.verdict || '—', 'hard feature gate')}
        ${metric('MAX STEP', `${fmt.n(ev.fullBadness?.motorStepMaxDeg, 2)}°`, '馬達單樣本最大跳動')}
        ${metric('P99 STEP', `${fmt.n(ev.fullBadness?.motorStepP99MeanDeg, 2)}°`, '馬達單樣本跳動 P99 平均')}
        ${metric('CROSS PEAK', fmt.n(ev.fullBadness?.poseCrossHpPeak, 2), 'FK cross-axis 高通峰值')}
        ${metric('WORST MOTOR', ev.fullBadness?.worstMotorStep?.label || '—', '最大跳動來源')}
      </div>
    </section>

    <section class="panel">
      <div class="tabs">
        ${tabButton('overview', '總覽')}
        ${tabButton('waveforms', '波形圖')}
        ${tabButton('replay', '軌跡回放')}
        ${tabButton('params', '參數')}
        ${tabButton('raw', '原始資料')}
      </div>
      <div class="tab-body" id="tab-body"></div>
    </section>`;
  $('detail').querySelectorAll('[data-tab]').forEach(b => b.onclick = () => { state.tab = b.dataset.tab; renderTab(); });
  $('archive-run').onclick = () => runOperation('archive');
  $('delete-run').onclick = () => runOperation('delete');
  renderTab();
}

function tabButton(id, label) {
  return `<button class="${state.tab === id ? 'active' : ''}" data-tab="${id}">${label}</button>`;
}

function renderTab() {
  const d = state.detail;
  const r = d.run || {};
  $('detail').querySelectorAll('[data-tab]').forEach(b => b.classList.toggle('active', b.dataset.tab === state.tab));
  const body = $('tab-body');
  if (state.tab !== 'replay') {
    stopReplay();
    destroyReplay3d();
  }
  if (state.tab === 'overview') body.innerHTML = overviewHtml(d);
  if (state.tab === 'waveforms') body.innerHTML = waveformsHtml(r);
  if (state.tab === 'replay') {
    body.innerHTML = replayHtml(d);
    setupReplay();
  }
  if (state.tab === 'params') body.innerHTML = paramsHtml(d);
  if (state.tab === 'raw') body.innerHTML = rawHtml(r);
}

async function runOperation(op) {
  const id = state.detail?.run?.id || state.selected;
  if (!id) return;
  const label = op === 'archive' ? '封存' : '刪除';
  const target = op === 'archive' ? 'archive' : 'trash';
  const text = op === 'archive'
    ? `封存 ${id}？\\n\\n它會從 active 面板消失，但檔案會移到 sysid/data/archive。`
    : `刪除 ${id}？\\n\\n這是 soft-delete：檔案會移到 sysid/data/trash，不會永久刪除。`;
  if (!confirm(text)) return;
  const status = $('op-status');
  if (status) status.textContent = `${label}中...`;
  try {
    const res = await fetch(`/api/runs/${encodeURIComponent(id)}/${op}`, { method: 'POST' });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || `${label}失敗`);
    state.selected = null;
    state.detail = null;
    stopReplay();
    $('detail').innerHTML = `<div class="empty-state">${label}完成：已移到 ${esc(target)}。請從左側選下一筆。</div>`;
    await loadRuns();
  } catch (err) {
    if (status) status.textContent = `${label}失敗：${err.message}`;
  }
}

function setupReplay() {
  const samples = state.detail?.samples || [];
  const scrub = $('scrub');
  const play = $('play');
  const home = $('view-home');
  const top = $('view-top');
  const traceToggle = $('trace3d-toggle');
  initReplay3d();
  if (!samples.length) { drawReplay(); return; }
  scrub.oninput = () => {
    state.replayIndex = Number(scrub.value);
    if (state.playing) {
      state.playStartedAt = performance.now();
      state.playStartTimeMs = sampleTimeMs(samples, state.replayIndex);
    }
    drawReplay();
  };
  play.onclick = () => state.playing ? stopReplay() : startReplay();
  if (home) home.onclick = () => setReplayView('home');
  if (top) top.onclick = () => setReplayView('top');
  document.querySelectorAll('.speed-btn').forEach((button) => {
    button.onclick = () => {
      const samples = state.detail?.samples || [];
      if (state.playing) {
        state.playStartTimeMs = sampleTimeMs(samples, state.replayIndex);
        state.playStartedAt = performance.now();
      }
      state.playbackRate = Math.max(0.05, Number(button.dataset.rate) || 1);
      updateReplayControls();
    };
  });
  if (traceToggle) {
    traceToggle.onchange = () => {
      state.showReplayTrace = !!traceToggle.checked;
      drawReplay();
    };
  }
  document.querySelectorAll('.plane-zoom-input').forEach((input) => {
    input.addEventListener('input', () => {
      const key = input.dataset.plane;
      state.planeZoom[key] = Number(input.value);
      const out = $(`zoom-${key}`);
      if (out) out.textContent = `${state.planeZoom[key].toFixed(1)}x`;
      drawReplay();
    });
  });
  drawReplay();
}

function sampleTimeMs(samples, index) {
  const s = samples[Math.max(0, Math.min(samples.length - 1, index))];
  const t = Number(s?.t);
  return Number.isFinite(t) ? t : index * (1000 / 60);
}

function indexAtReplayTime(samples, targetMs) {
  if (!samples.length) return 0;
  let lo = 0, hi = samples.length - 1;
  while (lo < hi) {
    const mid = Math.floor((lo + hi) / 2);
    if (sampleTimeMs(samples, mid) < targetMs) lo = mid + 1;
    else hi = mid;
  }
  if (lo > 0) {
    const prev = sampleTimeMs(samples, lo - 1);
    const cur = sampleTimeMs(samples, lo);
    return Math.abs(prev - targetMs) <= Math.abs(cur - targetMs) ? lo - 1 : lo;
  }
  return lo;
}

function updateReplayControls() {
  const samples = state.detail?.samples || [];
  const idx = Math.max(0, Math.min(samples.length - 1, state.replayIndex));
  const startMs = samples.length ? sampleTimeMs(samples, 0) : 0;
  const curMs = samples.length ? sampleTimeMs(samples, idx) : 0;
  const endMs = samples.length ? sampleTimeMs(samples, samples.length - 1) : 0;
  const current = $('replay-current');
  const total = $('replay-total');
  const index = $('replay-index');
  const rate = $('replay-rate');
  if (current) current.textContent = `${fmt.n((curMs - startMs) / 1000, 2)}s`;
  if (total) total.textContent = `${fmt.n((endMs - startMs) / 1000, 2)}s`;
  if (index) index.textContent = `${idx} / ${Math.max(0, samples.length - 1)}`;
  if (rate) rate.textContent = `${state.playbackRate.toFixed(state.playbackRate < 1 ? 2 : 1)}x`;
  document.querySelectorAll('.speed-btn').forEach((button) => {
    button.classList.toggle('active', Math.abs(Number(button.dataset.rate) - state.playbackRate) < 1e-6);
  });
}

function startReplay() {
  const samples = state.detail?.samples || [];
  if (!samples.length) return;
  state.playing = true;
  state.playStartedAt = performance.now();
  state.playStartTimeMs = sampleTimeMs(samples, state.replayIndex);
  $('play').textContent = '暫停';
  const tick = () => {
    if (!state.playing) return;
    const samples = state.detail?.samples || [];
    if (!samples.length) return stopReplay();
    const startMs = sampleTimeMs(samples, 0);
    const endMs = sampleTimeMs(samples, samples.length - 1);
    const durationMs = Math.max(1, endMs - startMs);
    const elapsedMs = (performance.now() - state.playStartedAt) * state.playbackRate;
    let targetMs = state.playStartTimeMs + elapsedMs;
    if (targetMs > endMs) targetMs = startMs + ((targetMs - startMs) % durationMs);
    state.replayIndex = indexAtReplayTime(samples, targetMs);
    const scrub = $('scrub');
    if (scrub) scrub.value = state.replayIndex;
    drawReplay();
    state.raf = requestAnimationFrame(tick);
  };
  state.raf = requestAnimationFrame(tick);
}

function stopReplay() {
  state.playing = false;
  if (state.raf) cancelAnimationFrame(state.raf);
  state.raf = null;
  const play = $('play');
  if (play) play.textContent = '播放';
  updateReplayControls();
}

const kin = window.Kin || {};
const stewartModel = createStewartModel(kin);
const KIN_B = stewartModel.B;
const cssHex = (hex) => `#${hex.toString(16).padStart(6, '0')}`;
const cssRgba = (hex, alpha) => {
  const r = (hex >> 16) & 255;
  const g = (hex >> 8) & 255;
  const b = hex & 255;
  return `rgba(${r},${g},${b},${alpha})`;
};

function modelFromSample(sample) {
  const pose = sample?.pose || [0, 0, kin.NEUTRAL_Z || 105, 0, 0, 0];
  const angles = Array.isArray(sample?.a) && sample.a.length === 6
    ? sample.a.map(Number)
    : (kin.ik?.(pose)?.angles || new Array(6).fill(90));
  return {
    pose,
    B: KIN_B,
    A: computeActuatorPoints(angles, stewartModel),
    Q: platformPointsFromPose(pose, stewartModel),
  };
}

function axisValue(point, axis) {
  if (axis === 'x') return Number(point.x);
  if (axis === 'y') return Number(point.y);
  return Number(point.z);
}

function poseAxis(pose, axis) {
  const map = { x: 0, y: 1, z: 2 };
  return Number(pose?.[map[axis]]);
}

function fitCanvas(canvas) {
  const rect = canvas.getBoundingClientRect();
  const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  const w = Math.max(1, Math.round(rect.width));
  const h = Math.max(1, Math.round(rect.height));
  if (canvas.width !== Math.round(w * dpr) || canvas.height !== Math.round(h * dpr)) {
    canvas.width = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
  }
  const ctx = canvas.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { ctx, W: w, H: h };
}

function drawPlane(spec, samples) {
  const canvas = $(spec.id);
  if (!canvas) return;
  const { ctx, W, H } = fitCanvas(canvas);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#FCFBFA';
  ctx.fillRect(0, 0, W, H);
  ctx.font = '11px SF Mono, Consolas, monospace';
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (!samples.length) {
    ctx.fillStyle = '#9A948A';
    ctx.fillText('no samples', 20, 30);
    return;
  }

  const idx = Math.max(0, Math.min(samples.length - 1, state.replayIndex));
  const model = modelFromSample(samples[idx]);
  const poses = samples.map(s => s.pose || []).filter(p => p.length >= 3);
  const hVals = poses.map(p => poseAxis(p, spec.h)).filter(Number.isFinite);
  const vVals = poses.map(p => poseAxis(p, spec.v)).filter(Number.isFinite);
  const hMin = hVals.length ? Math.min(...hVals) : 0;
  const hMax = hVals.length ? Math.max(...hVals) : 0;
  const vMin = vVals.length ? Math.min(...vVals) : 0;
  const vMax = vVals.length ? Math.max(...vVals) : 0;
  const zoom = Math.max(0.1, Number(state.planeZoom?.[spec.key]) || 1);
  const pad = { l: 54, r: 16, t: 18, b: 42 };
  const pw = Math.max(1, W - pad.l - pad.r);
  const ph = Math.max(1, H - pad.t - pad.b);
  const hSpan = Math.max(18, hMax - hMin);
  const vSpan = Math.max(spec.v === 'z' ? 18 : 12, vMax - vMin);
  const viewSpan = Math.max(hSpan, vSpan) * 1.25;
  const scale = Math.min(pw, ph) / Math.max(1e-6, viewSpan) * zoom;
  const midH = (hMin + hMax) / 2;
  const midV = (vMin + vMax) / 2;
  const cx = pad.l + pw / 2;
  const cy = pad.t + ph / 2;
  const project = (h, v) => [cx + (h - midH) * scale, cy - (v - midV) * scale];
  const pp = (point) => project(axisValue(point, spec.h), axisValue(point, spec.v));
  const cp = (pose) => project(poseAxis(pose, spec.h), poseAxis(pose, spec.v));
  const hVisibleMin = midH - (cx - pad.l) / scale;
  const hVisibleMax = midH + (W - pad.r - cx) / scale;
  const vVisibleMin = midV - (H - pad.b - cy) / scale;
  const vVisibleMax = midV + (cy - pad.t) / scale;

  const niceTick = (span, targetCount = 7) => {
    const raw = Math.max(1e-6, Math.abs(span)) / targetCount;
    const pow = 10 ** Math.floor(Math.log10(raw));
    const n = raw / pow;
    const step = n <= 1 ? 1 : n <= 2 ? 2 : n <= 5 ? 5 : 10;
    return step * pow;
  };
  const fmtTick = (value, step) => {
    if (Math.abs(value) < step * 1e-6) return '0';
    const digits = step < 1 ? 1 : 0;
    return Number(value).toFixed(digits);
  };
  const hTick = niceTick(hVisibleMax - hVisibleMin, Math.max(4, Math.floor(pw / 74)));
  const vTick = niceTick(vVisibleMax - vVisibleMin, Math.max(4, Math.floor(ph / 58)));

  ctx.save();
  ctx.strokeStyle = '#E8E4DB';
  ctx.fillStyle = '#8D867C';
  ctx.lineWidth = 1;
  ctx.font = '10px SF Mono, Consolas, monospace';
  ctx.textBaseline = 'top';
  ctx.textAlign = 'center';
  for (let v = Math.ceil(hVisibleMin / hTick) * hTick; v <= hVisibleMax + hTick * 0.5; v += hTick) {
    const [x] = project(v, midV);
    const major = Math.abs(v) < hTick * 1e-6;
    ctx.strokeStyle = major ? '#D9D0C5' : '#E8E4DB';
    ctx.beginPath(); ctx.moveTo(x, pad.t); ctx.lineTo(x, H - pad.b); ctx.stroke();
    if (x >= pad.l + 16 && x <= W - pad.r - 12) ctx.fillText(fmtTick(v, hTick), x, H - pad.b + 8);
  }
  ctx.textBaseline = 'middle';
  ctx.textAlign = 'right';
  for (let v = Math.ceil(vVisibleMin / vTick) * vTick; v <= vVisibleMax + vTick * 0.5; v += vTick) {
    const [, y] = project(midH, v);
    const major = Math.abs(v) < vTick * 1e-6;
    ctx.strokeStyle = major ? '#D9D0C5' : '#E8E4DB';
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(W - pad.r, y); ctx.stroke();
    if (y >= pad.t + 10 && y <= H - pad.b - 10) ctx.fillText(fmtTick(v, vTick), pad.l - 8, y);
  }
  ctx.restore();
  ctx.strokeStyle = '#DBD6CD';
  ctx.strokeRect(pad.l, pad.t, pw, ph);
  ctx.fillStyle = '#7A756C';
  ctx.font = '11px SF Mono, Consolas, monospace';
  ctx.fillText(spec.hLabel, W - pad.r - 54, H - 10);
  ctx.save();
  ctx.translate(12, pad.t + 48);
  ctx.rotate(-Math.PI / 2);
  ctx.fillText(spec.vLabel, 0, 0);
  ctx.restore();

  function drawPoly(points, fill, stroke, alpha = 1) {
    if (!points.length) return;
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    points.forEach((point, i) => {
      const [x, y] = pp(point);
      if (i) ctx.lineTo(x, y); else ctx.moveTo(x, y);
    });
    ctx.closePath();
    ctx.fillStyle = fill;
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 1.2;
    ctx.fill();
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  function drawSegment(a, b, color, width = 1, alpha = 1) {
    const [x0p, y0p] = pp(a);
    const [x1p, y1p] = pp(b);
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = color;
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.moveTo(x0p, y0p);
    ctx.lineTo(x1p, y1p);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
  function drawPoint(point, color, r = 3, alpha = 1) {
    const [x, y] = pp(point);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  drawPoly(model.B, cssRgba(StewartStyle.colors.basePlate, 0.22), cssHex(StewartStyle.colors.basePlate), spec.title === 'XY' ? 0.65 : 0.35);
  for (let i = 0; i < 6; i++) {
    drawSegment(model.B[i], model.A[i], cssHex(StewartStyle.colors.lowerLeg), 1, 0.32);
    drawSegment(model.A[i], model.Q[i], cssHex(StewartStyle.colors.upperLeg), 1, 0.38);
  }
  drawPoly(model.Q, cssRgba(StewartStyle.colors.platformPlate, 0.18), cssHex(StewartStyle.colors.platformPlate), 0.58);
  model.B.forEach(p => drawPoint(p, cssHex(StewartStyle.colors.baseJoint), 2.2, 0.52));
  model.A.forEach(p => drawPoint(p, cssHex(StewartStyle.colors.actuatorJoint), 2, 0.58));
  model.Q.forEach(p => drawPoint(p, cssHex(StewartStyle.colors.platformJoint), 2.2, 0.62));

  const step = Math.max(1, Math.ceil(poses.length / 260));
  ctx.beginPath();
  let moved = false;
  for (let i = 0; i < poses.length; i += step) {
    const [x, y] = cp(poses[i]);
    if (moved) ctx.lineTo(x, y); else ctx.moveTo(x, y);
    moved = true;
  }
  if (poses.length > 1 && (poses.length - 1) % step !== 0) {
    const [x, y] = cp(poses[poses.length - 1]);
    if (moved) ctx.lineTo(x, y);
  }
  ctx.strokeStyle = cssHex(StewartStyle.colors.trace);
  ctx.lineWidth = 2.4;
  ctx.stroke();

  const [px, py] = cp(model.pose);
  const glow = ctx.createRadialGradient(px, py, 1, px, py, 15);
  glow.addColorStop(0, cssRgba(StewartStyle.colors.trace, 0.72));
  glow.addColorStop(1, cssRgba(StewartStyle.colors.trace, 0));
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(px, py, 15, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = cssHex(StewartStyle.colors.trace);
  ctx.strokeStyle = '#FCFBFA';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(px, py, 4.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.stroke();
}

function initReplay3d() {
  if (state.replay3d) return;
  const host = $('replay3d');
  if (!host) return;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(StewartStyle.scene.lightBg);
  const camera = new THREE.PerspectiveCamera(50, 1, 1, 2000);
  camera.up.set(0, 0, 1);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
  host.appendChild(renderer.domElement);
  const labelRenderer = new CSS2DRenderer();
  labelRenderer.domElement.style.position = 'absolute';
  labelRenderer.domElement.style.inset = '0';
  labelRenderer.domElement.style.pointerEvents = 'none';
  host.appendChild(labelRenderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(0, 0, 60);
  controls.enableDamping = false;
  controls.addEventListener('change', () => renderReplay3d(false));

  scene.add(new THREE.AmbientLight(0xffffff, 0.7));
  const key = new THREE.DirectionalLight(0xffffff, 0.6);
  key.position.set(200, -200, 300);
  scene.add(key);

  const grid = new THREE.GridHelper(400, 20, StewartStyle.scene.gridMajor, StewartStyle.scene.gridMinor);
  grid.rotation.x = Math.PI / 2;
  scene.add(grid);

  const rig = createStewartRig(scene, stewartModel, {
    CSS2DObject,
    labels: true,
    labelClassName: 'motor-label',
  });
  const traceGeo = new THREE.BufferGeometry();
  traceGeo.setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(3), 3));
  traceGeo.setDrawRange(0, 0);
  const centerTrace = new THREE.Line(
    traceGeo,
    new THREE.LineBasicMaterial({ color: StewartStyle.colors.trace, transparent: true, opacity: 0.82 })
  );
  centerTrace.visible = state.showReplayTrace;
  scene.add(centerTrace);
  const centerDot = new THREE.Mesh(
    new THREE.SphereGeometry(4.5, 14, 10),
    new THREE.MeshPhongMaterial({ color: StewartStyle.colors.trace })
  );
  centerDot.visible = state.showReplayTrace;
  scene.add(centerDot);

  const ro = new ResizeObserver(fitReplay3d);
  ro.observe(host);
  state.replay3d = { host, scene, camera, renderer, labelRenderer, controls, ro, rig, centerTrace, centerDot, traceKey: '' };
  setReplayView('home');
  const empty = $('replay3d-empty');
  if (empty) empty.remove();
  fitReplay3d();
}

function fitReplay3d() {
  const r = state.replay3d;
  if (!r) return;
  const rect = r.host.getBoundingClientRect();
  const w = Math.max(1, Math.round(rect.width));
  const h = Math.max(1, Math.round(rect.height));
  r.renderer.setSize(w, h, false);
  r.labelRenderer.setSize(w, h);
  r.camera.aspect = w / h;
  r.camera.updateProjectionMatrix();
  renderReplay3d();
}

function setReplayView(view) {
  const r = state.replay3d;
  if (!r) return;
  if (view === 'top') {
    r.camera.position.set(0, 0, 560);
    r.controls.target.set(0, 0, 60);
  } else {
    r.camera.position.set(300, -300, 250);
    r.controls.target.set(0, 0, 60);
  }
  r.controls.update();
  renderReplay3d();
}

function renderReplay3d(updateControls = true) {
  const r = state.replay3d;
  if (!r) return;
  if (updateControls) r.controls.update();
  r.renderer.render(r.scene, r.camera);
  r.labelRenderer.render(r.scene, r.camera);
}

function destroyReplay3d() {
  const r = state.replay3d;
  if (!r) return;
  r.ro?.disconnect();
  r.controls?.dispose();
  r.renderer?.dispose();
  if (r.renderer?.domElement?.parentNode) r.renderer.domElement.parentNode.removeChild(r.renderer.domElement);
  if (r.labelRenderer?.domElement?.parentNode) r.labelRenderer.domElement.parentNode.removeChild(r.labelRenderer.domElement);
  state.replay3d = null;
}

function updateReplayTrace(samples) {
  const r = state.replay3d;
  if (!r) return;
  const key = `${state.detail?.run?.id || ''}:${samples.length}`;
  if (r.traceKey !== key) {
    const poses = samples.map(s => s.pose || []).filter(p => p.length >= 3);
    const points = new Float32Array(Math.max(1, poses.length) * 3);
    poses.forEach((p, i) => {
      points[i * 3] = Number(p[0] || 0);
      points[i * 3 + 1] = Number(p[1] || 0);
      points[i * 3 + 2] = Number(p[2] || kin.NEUTRAL_Z || 105);
    });
    r.centerTrace.geometry.setAttribute('position', new THREE.Float32BufferAttribute(points, 3));
    r.centerTrace.geometry.setDrawRange(0, poses.length);
    r.traceKey = key;
  }
  r.centerTrace.visible = state.showReplayTrace;
  r.centerDot.visible = state.showReplayTrace;
}

function updateReplay3d(sample) {
  const r = state.replay3d;
  if (!r || !sample) return;
  const samples = state.detail?.samples || [];
  updateReplayTrace(samples);
  const model = modelFromSample(sample);
  r.rig.updateFromPoints(model.A, model.Q);
  const p = sample.pose || [];
  r.centerDot.position.set(
    Number(p[0] || 0),
    Number(p[1] || 0),
    Number(p[2] || kin.NEUTRAL_Z || 105)
  );
  renderReplay3d();
}

function drawReplay() {
  const samples = state.detail?.samples || [];
  const planes = [
    { id: 'plane-xy', key: 'xy', h: 'x', v: 'y', hLabel: 'X mm', vLabel: 'Y mm', title: 'XY' },
    { id: 'plane-yz', key: 'yz', h: 'y', v: 'z', hLabel: 'Y mm', vLabel: 'Z mm', title: 'YZ' },
    { id: 'plane-xz', key: 'xz', h: 'x', v: 'z', hLabel: 'X mm', vLabel: 'Z mm', title: 'XZ' },
  ];
  planes.forEach(spec => drawPlane(spec, samples));
  if (!samples.length) {
    const rt = $('rt'), rp = $('rp'), rc = $('rc');
    if (rt) rt.textContent = '—';
    if (rp) rp.textContent = 'no replay samples';
    if (rc) rc.textContent = '—';
    return;
  }
  const idx = Math.max(0, Math.min(samples.length - 1, state.replayIndex));
  const s = samples[idx], p = s.pose || [];
  const timeText = `${fmt.n(Number(s.t) / 1000, 2)}s / ${fmt.n(Number(samples.at(-1)?.t || 0) / 1000, 2)}s`;
  const rt = $('rt'), rp = $('rp'), rc = $('rc');
  if (rt) rt.textContent = timeText;
  if (rp) rp.textContent = `X ${fmt.n(p[0], 1)} Y ${fmt.n(p[1], 1)} Z ${fmt.n(p[2], 1)} R ${fmt.n(p[3], 1)} P ${fmt.n(p[4], 1)} Y ${fmt.n(p[5], 1)}`;
  if (rc) rc.textContent = `ok ${s.ok ?? '—'} · hz ${fmt.n(s.lhz, 0)} · ef ${s.ef ?? '—'} · drop ${s.rxDrop ?? 0}`;
  updateReplayControls();
  updateReplay3d(s);
}

$('refresh').onclick = () => loadRuns(state.selected);
$('search').oninput = applyFilter;
$('program-filter').onchange = applyFilter;
window.RunPanel = { state, renderTab, loadRuns, selectRun };
loadRuns().catch(err => {
  $('run-list').innerHTML = `<div class="empty-state">讀取失敗：${esc(err.message)}</div>`;
});
</script>
<script src="/shared/app-nav.js" defer></script>
