<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stewart Platform Control</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-block">
        <div class="brand-mark">STEWART PLATFORM</div>
        <div class="brand-sub">SIMULATION / HARDWARE CONTROL SURFACE</div>
      </div>
      <div class="status-strip">
        <span class="chip" id="modeChip">SIM</span>
        <span class="chip" id="reachChip">REACHABLE</span>
        <span class="chip" id="linkChip">HW OFFLINE</span>
      </div>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <section class="ui-card">
          <div class="card-head">
            <h2>POSE</h2>
            <span class="micro-label">CONTROL</span>
          </div>
          <div id="poseControls" class="pose-stack"></div>
          <div class="timing-row">
            <label for="durationInput">TIME</label>
            <input id="durationInput" type="number" min="0.1" step="0.1">
            <span class="unit-tag">sec</span>
          </div>
          <div class="timing-hint" id="timingHint">平滑進出，減少突兀變化</div>
          <div class="button-row">
            <button class="action-button" id="homeBtn">Home</button>
            <button class="action-button primary" id="applyBtn">Apply Pose</button>
          </div>
        </section>

        <section class="ui-card">
          <div class="card-head">
            <h2>GEOMETRY</h2>
            <button class="micro-button" id="geometryToggle">COLLAPSE</button>
          </div>
          <div class="geometry-grid" id="geometryGrid"></div>
        </section>

        <section class="ui-card">
          <div class="card-head">
            <h2>DRIVE</h2>
            <span class="micro-label">DAMPING / TORQUE</span>
          </div>
          <div class="geometry-grid" id="driveGrid"></div>
          <div class="timing-hint" id="driveHint">提高電流增加可用扭力；降低 speed / accel 會讓運動更穩、更像有阻尼。</div>
          <div class="button-row single-row">
            <button class="action-button primary" id="applyDriveBtn">Apply Drive</button>
          </div>
        </section>

        <section class="ui-card">
          <div class="card-head">
            <h2>MOTORS</h2>
            <span class="micro-label">STATUS</span>
          </div>
          <div class="motor-summary" id="motorSummary"></div>
          <div class="calibration-panel">
            <div class="calibration-copy">
              <div class="micro-label">REFERENCE</div>
              <p>先手動調整到你要的基準姿態，再按下校正；Home 會回到同一個基準。</p>
            </div>
            <div class="button-row">
              <button class="action-button" id="manualPrepBtn" data-command="disable_all">Prepare Manual</button>
              <button class="action-button primary" id="calibrateBtn">Set Reference</button>
            </div>
            <div class="button-row single-row">
              <button class="action-button" id="allUpReferenceBtn">All-Up Reference</button>
            </div>
            <div class="feedback-strip" id="feedbackStrip">等待操作</div>
          </div>
          <div class="motor-grid" id="motorGrid"></div>
          <div class="button-row triple-row">
            <button class="action-button" data-command="enable_all">Enable All</button>
            <button class="action-button" data-command="disable_all">Disable All</button>
            <button class="action-button danger" data-command="stop">E-Stop</button>
          </div>
        </section>
      </aside>

      <section class="canvas-panel">
        <div class="canvas-toolbar">
          <button class="chip-button is-active" id="controlViewBtn" type="button">Control View</button>
          <button class="chip-button" id="geometryViewBtn" type="button">Geometry Mode</button>
        </div>
        <div id="sceneViewport"></div>
      </section>
    </main>
  </div>
  <script type="module" src="/app.js"></script>
</body>
</html>
