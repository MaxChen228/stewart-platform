<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Stewart Platform Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+TC:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F8F7F4;
  --surface: #FCFBFA;
  --borderBase: #DBD6CD;
  --borderL: #E8E4DB;
  --ink: #2A2520;
  --sub: #7A756C;
  --inkLight: #5A5550;
  --dev: #C0392B;
  --contra: #4A6B8C;
  --dual: #D35400;
  --accent: #E6B300;

  --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  --font-sans: 'Noto Sans TC', sans-serif;

  --nav-height: 52px;
  --sidebar-width: 440px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { -webkit-font-smoothing: antialiased; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--font-sans);
  font-weight: 300;
  font-size: 13px;
  line-height: 1.8;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ===== Scrollbar ===== */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--borderBase); }
::-webkit-scrollbar-thumb:hover { background: var(--sub); }

/* ===== Nav Bar ===== */
.nav {
  height: var(--nav-height);
  background: var(--surface);
  border-bottom: 1px solid var(--borderBase);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  z-index: 20;
  flex-shrink: 0;
}

.nav-brand {
  font-family: var(--font-mono);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 0.16em;
  color: var(--ink);
}

.nav-status {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.nav-status.disconnected { color: var(--dev); }
.nav-status.connected { color: var(--contra); }

/* ===== Content ===== */
.content {
  flex: 1;
  display: flex;
  flex-direction: row;
  min-height: 0;
}

/* ===== Sidebar ===== */
.sidebar {
  width: var(--sidebar-width);
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--borderBase);
  box-shadow: 4px 0 24px rgba(0,0,0,0.03);
  overflow-y: auto;
  padding: 32px 24px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* ===== Card ===== */
.ui-card {
  background: var(--surface);
  border: 1px solid var(--borderBase);
  border-radius: 4px;
  padding: 20px;
}

.ui-card-title {
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--borderL);
}

/* ===== Chips ===== */
.chip {
  display: inline-flex;
  align-items: center;
  padding: 4px 12px;
  border: 1px solid var(--borderBase);
  border-radius: 12px;
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--ink);
  background: transparent;
  cursor: pointer;
  transition: all 0.2s ease;
  user-select: none;
}

.chip:hover { border-color: var(--sub); }

.chip.active {
  background: var(--contra);
  border-color: transparent;
  color: #fff;
}

.chip.danger {
  border-color: var(--dev);
  color: var(--dev);
}
.chip.danger:hover {
  background: var(--dev);
  color: #fff;
}

.chip:disabled {
  opacity: 0.3;
  cursor: default;
  pointer-events: none;
}

/* ===== Matrix Grid ===== */
.matrix-grid {
  display: grid;
  gap: 1px;
  background: var(--borderL);
  border: 1px solid var(--borderL);
  border-radius: 2px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.02);
  overflow: hidden;
}

.matrix-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
.matrix-grid.cols-6 { grid-template-columns: repeat(6, 1fr); }

.matrix-cell {
  background: var(--surface);
  padding: 8px 12px;
  text-align: center;
}

.matrix-cell-label {
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--sub);
  margin-bottom: 2px;
}

.matrix-cell-value {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 400;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}

/* ===== Inset Panel ===== */
.inset-panel {
  background: var(--bg);
  border-left: 1px solid var(--borderBase);
  border-right: 1px solid var(--borderBase);
  border-radius: 2px;
  padding: 12px 16px;
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--inkLight);
  line-height: 1.6;
}

/* ===== Chip Group ===== */
.chip-group {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

/* ===== Dev Label ===== */
.dev-label {
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--sub);
}

/* ===== Canvas Zone ===== */
.canvas-zone {
  flex: 1;
  position: relative;
  overflow: hidden;
  cursor: grab;
}
.canvas-zone:active { cursor: grabbing; }

canvas {
  display: block;
  width: 100%;
  height: 100%;
}
</style>
</head>
<body>

<!-- Nav Bar -->
<nav class="nav">
  <div class="nav-brand">PHYSICS_LAB</div>
  <div id="status" class="nav-status disconnected">DISCONNECTED</div>
</nav>

<!-- Content -->
<div class="content">
  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Commands Card -->
    <div class="ui-card">
      <div class="ui-card-title">Commands</div>
      <div class="chip-group">
        <button class="chip zbtn" onclick="sendCmd('Z')" disabled>Zero All</button>
        <button class="chip danger zbtn" onclick="sendCmd('D')" disabled>Disable</button>
        <button class="chip" onclick="resetFK()">Reset FK</button>
      </div>
    </div>

    <!-- Individual Motors Card -->
    <div class="ui-card">
      <div class="ui-card-title">Individual Zero</div>
      <div class="chip-group">
        <button class="chip zbtn" onclick="sendCmd('Z0')" disabled>M1</button>
        <button class="chip zbtn" onclick="sendCmd('Z1')" disabled>M2</button>
        <button class="chip zbtn" onclick="sendCmd('Z2')" disabled>M3</button>
        <button class="chip zbtn" onclick="sendCmd('Z3')" disabled>M4</button>
        <button class="chip zbtn" onclick="sendCmd('Z4')" disabled>M5</button>
        <button class="chip zbtn" onclick="sendCmd('Z5')" disabled>M6</button>
      </div>
    </div>

    <!-- Motor Angles Card -->
    <div class="ui-card">
      <div class="ui-card-title">Motor Angles</div>
      <div id="angles" class="matrix-grid cols-6">
        <div class="matrix-cell" id="ang-0"><div class="matrix-cell-label">M1</div><div class="matrix-cell-value">—</div></div>
        <div class="matrix-cell" id="ang-1"><div class="matrix-cell-label">M2</div><div class="matrix-cell-value">—</div></div>
        <div class="matrix-cell" id="ang-2"><div class="matrix-cell-label">M3</div><div class="matrix-cell-value">—</div></div>
        <div class="matrix-cell" id="ang-3"><div class="matrix-cell-label">M4</div><div class="matrix-cell-value">—</div></div>
        <div class="matrix-cell" id="ang-4"><div class="matrix-cell-label">M5</div><div class="matrix-cell-value">—</div></div>
        <div class="matrix-cell" id="ang-5"><div class="matrix-cell-label">M6</div><div class="matrix-cell-value">—</div></div>
      </div>
    </div>

    <!-- Pose Card -->
    <div class="ui-card">
      <div class="ui-card-title">Platform Pose</div>
      <div id="pose-display" class="matrix-grid cols-3">
        <div class="matrix-cell" id="pose-x"><div class="matrix-cell-label">X</div><div class="matrix-cell-value">—</div></div>
        <div class="matrix-cell" id="pose-y"><div class="matrix-cell-label">Y</div><div class="matrix-cell-value">—</div></div>
        <div class="matrix-cell" id="pose-z"><div class="matrix-cell-label">Z</div><div class="matrix-cell-value">—</div></div>
        <div class="matrix-cell" id="pose-r"><div class="matrix-cell-label">Roll</div><div class="matrix-cell-value">—</div></div>
        <div class="matrix-cell" id="pose-p"><div class="matrix-cell-label">Pitch</div><div class="matrix-cell-value">—</div></div>
        <div class="matrix-cell" id="pose-w"><div class="matrix-cell-label">Yaw</div><div class="matrix-cell-value">—</div></div>
      </div>
    </div>

    <!-- FK Debug Card -->
    <div class="ui-card">
      <div class="ui-card-title">Diagnostics</div>
      <div id="fk-debug" class="inset-panel">—</div>
      <div id="raw" class="inset-panel" style="margin-top: 8px;">—</div>
    </div>

  </aside>

  <!-- Canvas -->
  <div class="canvas-zone" id="canvas-zone"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ===== 幾何參數（與 C++ 一致）=====
const BASE_RADIUS = 152, BASE_ANGLE = 18.92;
const PLATFORM_RADIUS = 103, PLATFORM_ANGLE = 28.07;
const LOWER_LEG = 65, UPPER_LEG = 165;
const NEUTRAL_Z = 105;
const DEG = Math.PI / 180;
const MOTOR_PLANE_ANGLE = [-90, 90, 30, 210, -210, -30];

const BASE_ANGLES = [
  -BASE_ANGLE/2, BASE_ANGLE/2,
  -BASE_ANGLE/2+120, BASE_ANGLE/2+120,
  -BASE_ANGLE/2-120, BASE_ANGLE/2-120
];
const PLATFORM_ANGLES = [
  -PLATFORM_ANGLE/2, PLATFORM_ANGLE/2,
  -PLATFORM_ANGLE/2+120, PLATFORM_ANGLE/2+120,
  -PLATFORM_ANGLE/2-120, PLATFORM_ANGLE/2-120
];

const B = [], P = [];
for (let i = 0; i < 6; i++) {
  const ba = BASE_ANGLES[i] * DEG, pa = PLATFORM_ANGLES[i] * DEG;
  B.push(new THREE.Vector3(BASE_RADIUS*Math.cos(ba), BASE_RADIUS*Math.sin(ba), 0));
  P.push(new THREE.Vector3(PLATFORM_RADIUS*Math.cos(pa), PLATFORM_RADIUS*Math.sin(pa), 0));
}

const hDist2 = (P[0].x-B[0].x)**2 + (P[0].y-B[0].y)**2;
const Z_LEGS_UP = LOWER_LEG + Math.sqrt(UPPER_LEG*UPPER_LEG - hDist2);
console.log('Z_LEGS_UP =', Z_LEGS_UP.toFixed(1));

// ===== 逆向運動學 =====
function ik(pose) {
  const [x,y,z,roll,pitch,yaw] = pose;
  const cr=Math.cos(roll*DEG), sr=Math.sin(roll*DEG);
  const cp=Math.cos(pitch*DEG), sp=Math.sin(pitch*DEG);
  const cy=Math.cos(yaw*DEG), sy=Math.sin(yaw*DEG);
  const R = [
    [cy*cp, cy*sp*sr-sy*cr, cy*sp*cr+sy*sr],
    [sy*cp, sy*sp*sr+cy*cr, sy*sp*cr-cy*sr],
    [-sp, cp*sr, cp*cr]
  ];
  const angles = [];
  for (let i = 0; i < 6; i++) {
    const px=P[i].x, py=P[i].y, pz=P[i].z;
    const qx = R[0][0]*px + R[0][1]*py + R[0][2]*pz + x;
    const qy = R[1][0]*px + R[1][1]*py + R[1][2]*pz + y;
    const qz = R[2][0]*px + R[2][1]*py + R[2][2]*pz + z;
    const dx=qx-B[i].x, dy=qy-B[i].y, dz=qz-B[i].z;
    const L = dx*dx+dy*dy+dz*dz-(UPPER_LEG*UPPER_LEG-LOWER_LEG*LOWER_LEG);
    const M = 2*LOWER_LEG*dz;
    const th = MOTOR_PLANE_ANGLE[i]*DEG;
    const N = 2*LOWER_LEG*(Math.cos(th)*dx + Math.sin(th)*dy);
    const d = Math.sqrt(M*M+N*N);
    const sa = Math.max(-1, Math.min(1, L/d));
    angles.push((Math.asin(sa) - Math.atan2(N,M)) / DEG);
  }
  return angles;
}

// ===== 高斯消去 6×6 =====
function gaussSolve(A, b) {
  const n = 6;
  const M = A.map((row,i) => [...row, b[i]]);
  for (let i = 0; i < n; i++) {
    let mx = i;
    for (let k=i+1;k<n;k++) if(Math.abs(M[k][i])>Math.abs(M[mx][i])) mx=k;
    [M[i],M[mx]]=[M[mx],M[i]];
    if (Math.abs(M[i][i])<1e-10) return null;
    for (let k=i+1;k<n;k++) {
      const c=M[k][i]/M[i][i];
      for(let j=i;j<=n;j++) M[k][j]-=c*M[i][j];
    }
  }
  const x=new Array(n);
  for(let i=n-1;i>=0;i--) {
    x[i]=M[i][n];
    for(let j=i+1;j<n;j++) x[i]-=M[i][j]*x[j];
    x[i]/=M[i][i];
  }
  return x;
}

// ===== FK（距離約束 Newton-Raphson，解析 Jacobian）=====
let lastPose = [0, 0, NEUTRAL_Z, 0, 0, 0];
let fkStatus = '';

function solveFK(measured) {
  const A = computeA(measured);
  if (lastPose.some(v => !isFinite(v))) lastPose = [0, 0, NEUTRAL_Z, 0, 0, 0];
  let pose = [...lastPose];
  let finalIter = 0, finalErr = 999;

  for (let iter = 0; iter < 50; iter++) {
    const [x, y, z, roll, pitch, yaw] = pose;
    const cr = Math.cos(roll*DEG), sr = Math.sin(roll*DEG);
    const cp = Math.cos(pitch*DEG), sp = Math.sin(pitch*DEG);
    const cy2 = Math.cos(yaw*DEG), sy2 = Math.sin(yaw*DEG);
    const R = [
      [cy2*cp, cy2*sp*sr-sy2*cr, cy2*sp*cr+sy2*sr],
      [sy2*cp, sy2*sp*sr+cy2*cr, sy2*sp*cr-cy2*sr],
      [-sp, cp*sr, cp*cr]
    ];
    const dRr = [
      [0, cy2*sp*cr+sy2*sr, -cy2*sp*sr+sy2*cr],
      [0, sy2*sp*cr-cy2*sr, -sy2*sp*sr-cy2*cr],
      [0, cp*cr, -cp*sr]
    ];
    const dRp = [
      [-cy2*sp, cy2*cp*sr, cy2*cp*cr],
      [-sy2*sp, sy2*cp*sr, sy2*cp*cr],
      [-cp, -sp*sr, -sp*cr]
    ];
    const dRyw = [
      [-sy2*cp, -sy2*sp*sr-cy2*cr, -sy2*sp*cr+cy2*sr],
      [cy2*cp, cy2*sp*sr-sy2*cr, cy2*sp*cr+sy2*sr],
      [0, 0, 0]
    ];

    const f = [], J = [];
    for (let i = 0; i < 6; i++) {
      const px = P[i].x, py = P[i].y;
      const qx = R[0][0]*px + R[0][1]*py + x;
      const qy = R[1][0]*px + R[1][1]*py + y;
      const qz = R[2][0]*px + R[2][1]*py + z;
      const vx = qx-A[i].x, vy = qy-A[i].y, vz = qz-A[i].z;
      f.push(vx*vx + vy*vy + vz*vz - UPPER_LEG*UPPER_LEG);
      const drx = dRr[0][0]*px+dRr[0][1]*py, dry = dRr[1][0]*px+dRr[1][1]*py, drz = dRr[2][0]*px+dRr[2][1]*py;
      const dpx2 = dRp[0][0]*px+dRp[0][1]*py, dpy2 = dRp[1][0]*px+dRp[1][1]*py, dpz2 = dRp[2][0]*px+dRp[2][1]*py;
      const dyx = dRyw[0][0]*px+dRyw[0][1]*py, dyy = dRyw[1][0]*px+dRyw[1][1]*py;
      J.push([
        2*vx, 2*vy, 2*vz,
        2*(vx*drx+vy*dry+vz*drz)*DEG,
        2*(vx*dpx2+vy*dpy2+vz*dpz2)*DEG,
        2*(vx*dyx+vy*dyy)*DEG
      ]);
    }

    const maxF = Math.max(...f.map(Math.abs));
    finalIter = iter; finalErr = maxF;

    if (maxF < 1.0) {
      fkStatus = `FK OK iter=${iter} err=${maxF.toFixed(3)}`;
      lastPose = [...pose];
      return pose;
    }

    const neg_f = f.map(v => -v);
    const dp = gaussSolve(J, neg_f);
    if (!dp || dp.some(v => !isFinite(v))) {
      fkStatus = `FK FAIL singular iter=${iter} err=${maxF.toFixed(1)}`;
      break;
    }

    const stepLimit = [30, 30, 30, 15, 15, 15];
    for (let j = 0; j < 6; j++) {
      dp[j] = Math.max(-stepLimit[j], Math.min(stepLimit[j], dp[j]));
      pose[j] += dp[j];
    }

    if (pose.some(v => !isFinite(v))) {
      fkStatus = `FK FAIL NaN iter=${iter}`;
      pose = [...lastPose];
      break;
    }
  }

  if (finalErr > 1.0) {
    fkStatus = `FK NO CONVERGE iter=${finalIter} err=${finalErr.toFixed(1)}`;
  }

  if (pose.every(v => isFinite(v))) lastPose = [...pose];
  return lastPose;
}

// ===== 從馬達角度算 A 點 =====
function computeA(angles) {
  return angles.map((ang, i) => {
    const a = ang * DEG, th = MOTOR_PLANE_ANGLE[i] * DEG;
    return new THREE.Vector3(
      LOWER_LEG*Math.cos(a)*Math.cos(th) + B[i].x,
      LOWER_LEG*Math.cos(a)*Math.sin(th) + B[i].y,
      LOWER_LEG*Math.sin(a) + B[i].z
    );
  });
}

// ===== Three.js 場景 =====
const canvasZone = document.getElementById('canvas-zone');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xF8F7F4);
const camera = new THREE.PerspectiveCamera(50, canvasZone.clientWidth/canvasZone.clientHeight, 1, 2000);
camera.up.set(0,0,1);
camera.position.set(300, -300, 250);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(canvasZone.clientWidth, canvasZone.clientHeight);
canvasZone.appendChild(renderer.domElement);
const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0, 60);
controls.update();

// 燈光
scene.add(new THREE.AmbientLight(0xffffff, 0.7));
const dl = new THREE.DirectionalLight(0xffffff, 0.6);
dl.position.set(200, -200, 300);
scene.add(dl);

// 地面網格 — warm neutral tones
const grid = new THREE.GridHelper(400, 20, 0xDBD6CD, 0xE8E4DB);
grid.rotation.x = Math.PI/2;
scene.add(grid);

// 建立幾何物件
function makeSphere(color, r=4) {
  const m = new THREE.Mesh(new THREE.SphereGeometry(r,8,8), new THREE.MeshPhongMaterial({color}));
  scene.add(m);
  return m;
}
function makeLine(color, width=1) {
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute([0,0,0,0,0,0],3));
  const line = new THREE.Line(geo, new THREE.LineBasicMaterial({color}));
  scene.add(line);
  return line;
}
function updateLine(line, a, b) {
  const p = line.geometry.attributes.position.array;
  p[0]=a.x;p[1]=a.y;p[2]=a.z; p[3]=b.x;p[4]=b.y;p[5]=b.z;
  line.geometry.attributes.position.needsUpdate = true;
}

const bSpheres=[], aSpheres=[], qSpheres=[];
const lowerLines=[], upperLines=[];
for (let i=0;i<6;i++) {
  bSpheres.push(makeSphere(0xC0392B, 5));   // dev red
  aSpheres.push(makeSphere(0xE6B300, 4));   // accent gold
  qSpheres.push(makeSphere(0x4A6B8C, 4));   // contra blue
  lowerLines.push(makeLine(0x4A6B8C));       // contra
  upperLines.push(makeLine(0xD35400));       // dual
}

// 底座面
const baseMesh = (() => {
  const shape = new THREE.Shape();
  shape.moveTo(B[0].x, B[0].y);
  for(let i=1;i<6;i++) shape.lineTo(B[i].x, B[i].y);
  shape.closePath();
  const geo = new THREE.ShapeGeometry(shape);
  const mat = new THREE.MeshPhongMaterial({color:0xDBD6CD, transparent:true, opacity:0.5, side:THREE.DoubleSide});
  const m = new THREE.Mesh(geo, mat);
  scene.add(m);
  return m;
})();

// 平台面
const platGeo = new THREE.BufferGeometry();
platGeo.setAttribute('position', new THREE.Float32BufferAttribute(new Float32Array(54), 3));
const platMesh = new THREE.Mesh(platGeo, new THREE.MeshPhongMaterial({color:0xC0392B, transparent:true, opacity:0.35, side:THREE.DoubleSide}));
scene.add(platMesh);

function updatePlatform(Q) {
  const p = platGeo.attributes.position.array;
  let cx=0,cy=0,cz=0;
  for(let i=0;i<6;i++){cx+=Q[i].x;cy+=Q[i].y;cz+=Q[i].z;}
  cx/=6;cy/=6;cz/=6;
  for(let i=0;i<6;i++){
    const j=(i+1)%6, k=i*9;
    p[k]=cx;p[k+1]=cy;p[k+2]=cz;
    p[k+3]=Q[i].x;p[k+4]=Q[i].y;p[k+5]=Q[i].z;
    p[k+6]=Q[j].x;p[k+7]=Q[j].y;p[k+8]=Q[j].z;
  }
  platGeo.attributes.position.needsUpdate = true;
  platGeo.computeVertexNormals();
}

// ===== 更新視覺化 =====
function updateViz(motorAngles) {
  const Apt = computeA(motorAngles);
  const pose = solveFK(motorAngles);
  const [x,y,z,roll,pitch,yaw] = pose;
  const cr=Math.cos(roll*DEG),sr=Math.sin(roll*DEG);
  const cp=Math.cos(pitch*DEG),sp=Math.sin(pitch*DEG);
  const cy2=Math.cos(yaw*DEG),sy2=Math.sin(yaw*DEG);
  const R=[[cy2*cp,cy2*sp*sr-sy2*cr,cy2*sp*cr+sy2*sr],[sy2*cp,sy2*sp*sr+cy2*cr,sy2*sp*cr-cy2*sr],[-sp,cp*sr,cp*cr]];
  const Q = P.map(p => new THREE.Vector3(
    R[0][0]*p.x+R[0][1]*p.y+R[0][2]*p.z+x,
    R[1][0]*p.x+R[1][1]*p.y+R[1][2]*p.z+y,
    R[2][0]*p.x+R[2][1]*p.y+R[2][2]*p.z+z
  ));

  for(let i=0;i<6;i++){
    bSpheres[i].position.copy(B[i]);
    aSpheres[i].position.copy(Apt[i]);
    qSpheres[i].position.copy(Q[i]);
    updateLine(lowerLines[i], B[i], Apt[i]);
    updateLine(upperLines[i], Apt[i], Q[i]);
  }
  updatePlatform(Q);

  // Update matrix cells
  for(let i=0;i<6;i++) {
    const cell = document.querySelector(`#ang-${i} .matrix-cell-value`);
    if(cell) cell.textContent = motorAngles[i].toFixed(1) + '°';
  }

  const poseFields = [
    ['pose-x', x], ['pose-y', y], ['pose-z', z],
    ['pose-r', roll], ['pose-p', pitch], ['pose-w', yaw]
  ];
  for(const [id, val] of poseFields) {
    const cell = document.querySelector(`#${id} .matrix-cell-value`);
    if(cell) cell.textContent = val.toFixed(1);
  }

  document.getElementById('fk-debug').textContent = fkStatus;
  document.getElementById('fk-debug').style.color =
    fkStatus.startsWith('FK OK') ? 'var(--contra)' : 'var(--dev)';
}

// 初始顯示中立
updateViz(ik([0,0,NEUTRAL_Z,0,0,0]));

// Self-test
{
  const testPose = [0, 0, NEUTRAL_Z, 0, 10, 0];

}

  camera.aspect = canvasZone.clientWidth/canvasZone.clientHeight;

// ===== WebSocket =====
let ws = null;

function connectWS() {
  const url = `ws://${location.host}`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    document.getElementById('status').textContent = 'CONNECTED';
    document.getElementById('status').className = 'nav-status connected';
    document.querySelectorAll('.zbtn').forEach(b => b.disabled = false);
  };

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.a) updateViz(data.a);
      if (data.r) {
        document.getElementById('raw').textContent =
          `Raw: ${data.r.join(' ')} | ok:${data.ok} z:${data.z}`;
      }
      if (data.status) {
        document.getElementById('status').textContent = data.status.toUpperCase();
        document.getElementById('status').className = 'nav-status connected';
        if (data.status.includes('zeroed')) {
          lastPose = [0, 0, Z_LEGS_UP, 0, 0, 0];
        }
      }
    } catch(e) {}
  };

  ws.onclose = () => {
    document.getElementById('status').textContent = 'DISCONNECTED';
    document.getElementById('status').className = 'nav-status disconnected';
    document.querySelectorAll('.zbtn').forEach(b => b.disabled = true);
    setTimeout(connectWS, 1000);
  };
}

window.sendCmd = function(cmd) {
  if (ws && ws.readyState === 1) ws.send(cmd);
};

window.resetFK = function() {
  lastPose = [0, 0, NEUTRAL_Z, 0, 0, 0];
  fkStatus = 'FK reset';
  document.getElementById('fk-debug').textContent = fkStatus;
  document.getElementById('fk-debug').style.color = 'var(--sub)';
};

window.connectSerial = connectWS;
connectWS();
</script>
