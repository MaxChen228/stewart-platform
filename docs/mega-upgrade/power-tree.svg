<svg width="100%" viewBox="0 0 680 540" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Mega 進化 — 電源樹接線圖</title>
<desc>AC 110V 經 24V/350W 電源供應器分配到六顆 SERVO42ES 馬達與邏輯電源；24V 降壓 5V 經 BQ24074 power-path 與 18650 緩衝供電給 ESP32-S3，MAX17048 回報電量，24V 分壓供 ADC 偵測市電。</desc>
<style>
text{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
.t,.th{fill:#2C2C2A;font-weight:500;font-size:14px}
.ts{fill:#5F5E5A;font-weight:400;font-size:12px}
.c-red rect{fill:#FCEBEB;stroke:#993C1D}.c-red .t,.c-red .th{fill:#4A1B0C}.c-red .ts{fill:#712B13}
.c-amber rect{fill:#FAEEDA;stroke:#854F0B}.c-amber .t,.c-amber .th{fill:#412402}.c-amber .ts{fill:#633806}
.c-blue rect{fill:#E6F1FB;stroke:#185FA5}.c-blue .t,.c-blue .th{fill:#042C53}.c-blue .ts{fill:#0C447C}
.c-purple rect{fill:#EEEDFE;stroke:#534AB7}.c-purple .t,.c-purple .th{fill:#26215C}.c-purple .ts{fill:#3C3489}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A}.c-gray .t,.c-gray .th{fill:#2C2C2A}.c-gray .ts{fill:#444441}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="540" fill="#ffffff"/>

<rect x="18" y="9" width="14" height="11" fill="#E04A4A"/><text class="ts" x="37" y="15" dominant-baseline="central">24V</text>
<rect x="92" y="9" width="14" height="11" fill="#BA7517"/><text class="ts" x="111" y="15" dominant-baseline="central">5V</text>
<rect x="150" y="9" width="14" height="11" fill="#378ADD"/><text class="ts" x="169" y="15" dominant-baseline="central">訊號</text>
<rect x="232" y="9" width="14" height="11" fill="#7F77DD"/><text class="ts" x="251" y="15" dominant-baseline="central">I²C</text>
<rect x="300" y="9" width="14" height="11" fill="#5F5E5A"/><text class="ts" x="319" y="15" dominant-baseline="central">GND（接地見 star-ground.svg）</text>

<g class="c-red"><rect x="24" y="40" width="110" height="48" rx="8" stroke-width="0.5"/><text class="th" x="79" y="60" text-anchor="middle" dominant-baseline="central">AC 110V</text><text class="ts" x="79" y="76" text-anchor="middle" dominant-baseline="central">市電輸入</text></g>
<g class="c-red"><rect x="196" y="40" width="160" height="48" rx="8" stroke-width="0.5"/><text class="th" x="276" y="60" text-anchor="middle" dominant-baseline="central">PSU 24V / 350W</text><text class="ts" x="276" y="76" text-anchor="middle" dominant-baseline="central">馬達主電源</text></g>
<g class="c-red"><rect x="420" y="40" width="120" height="48" rx="8" stroke-width="0.5"/><text class="th" x="480" y="60" text-anchor="middle" dominant-baseline="central">動力匯流排</text><text class="ts" x="480" y="76" text-anchor="middle" dominant-baseline="central">24V bus</text></g>
<g class="c-gray"><rect x="580" y="40" width="80" height="64" rx="8" stroke-width="0.5"/><text class="th" x="620" y="58" text-anchor="middle" dominant-baseline="central">M1–M6</text><text class="ts" x="620" y="75" text-anchor="middle" dominant-baseline="central">SERVO42ES</text><text class="ts" x="620" y="92" text-anchor="middle" dominant-baseline="central">24V</text></g>

<g class="c-amber"><rect x="196" y="126" width="160" height="46" rx="8" stroke-width="0.5"/><text class="th" x="276" y="146" text-anchor="middle" dominant-baseline="central">Buck 24V→5V</text><text class="ts" x="276" y="162" text-anchor="middle" dominant-baseline="central">降壓穩壓</text></g>
<g class="c-amber"><rect x="196" y="208" width="160" height="50" rx="8" stroke-width="0.5"/><text class="th" x="276" y="229" text-anchor="middle" dominant-baseline="central">BQ24074</text><text class="ts" x="276" y="245" text-anchor="middle" dominant-baseline="central">power-path 切換</text></g>
<g class="c-amber"><rect x="24" y="208" width="140" height="50" rx="8" stroke-width="0.5"/><text class="th" x="94" y="229" text-anchor="middle" dominant-baseline="central">18650 ×1</text><text class="ts" x="94" y="245" text-anchor="middle" dominant-baseline="central">帶保護板</text></g>
<g class="c-purple"><rect x="24" y="290" width="140" height="46" rx="8" stroke-width="0.5"/><text class="th" x="94" y="310" text-anchor="middle" dominant-baseline="central">MAX17048</text><text class="ts" x="94" y="326" text-anchor="middle" dominant-baseline="central">電量燃料計</text></g>
<g class="c-red"><rect x="470" y="208" width="120" height="50" rx="8" stroke-width="0.5"/><text class="th" x="530" y="229" text-anchor="middle" dominant-baseline="central">24V sense</text><text class="ts" x="530" y="245" text-anchor="middle" dominant-baseline="central">分壓 ÷</text></g>

<g class="c-blue"><rect x="236" y="300" width="210" height="132" rx="8" stroke-width="0.5"/>
<text class="th" x="341" y="322" text-anchor="middle" dominant-baseline="central">ESP32-S3</text>
<text class="ts" x="341" y="338" text-anchor="middle" dominant-baseline="central">N16R8 16MB/8MB</text>
<text class="ts" x="248" y="366" dominant-baseline="central">5V in    ← UPS 5V</text>
<text class="ts" x="248" y="386" dominant-baseline="central">GND      ← 星點</text>
<text class="ts" x="248" y="406" dominant-baseline="central">GPIO1    ← 24V sense</text>
<text class="ts" x="248" y="424" dominant-baseline="central">GPIO8/9  ← I²C 電量</text>
</g>
<g class="c-gray"><rect x="271" y="472" width="140" height="34" rx="8" stroke-width="0.5"/><text class="ts" x="341" y="489" text-anchor="middle" dominant-baseline="central">USB-C → 電腦/序列</text></g>

<text class="ts" x="24" y="196" dominant-baseline="central">UPS 緩衝（停電不斷電）</text>

<line x1="134" y1="64" x2="196" y2="64" stroke="#E04A4A" stroke-width="3" marker-end="url(#arrow)"/>
<line x1="356" y1="64" x2="420" y2="64" stroke="#E04A4A" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="540" y1="64" x2="580" y2="64" stroke="#E04A4A" stroke-width="4" marker-end="url(#arrow)"/>
<line x1="276" y1="88" x2="276" y2="126" stroke="#E04A4A" stroke-width="3" marker-end="url(#arrow)"/>
<text class="ts" x="290" y="108" dominant-baseline="central">24V</text>
<line x1="276" y1="172" x2="276" y2="208" stroke="#BA7517" stroke-width="3" marker-end="url(#arrow)"/>
<text class="ts" x="290" y="191" dominant-baseline="central">5V</text>
<line x1="196" y1="233" x2="164" y2="233" stroke="#BA7517" stroke-width="3" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
<text class="ts" x="180" y="223" text-anchor="middle" dominant-baseline="central">充/放</text>
<line x1="94" y1="258" x2="94" y2="290" stroke="#5F5E5A" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="106" y="275" dominant-baseline="central">VBAT</text>
<line x1="276" y1="258" x2="276" y2="300" stroke="#BA7517" stroke-width="3" marker-end="url(#arrow)"/>
<text class="ts" x="290" y="280" dominant-baseline="central">5V</text>
<path d="M164 313 H206 V424 H236" fill="none" stroke="#7F77DD" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="208" y="306" text-anchor="middle" dominant-baseline="central">I²C</text>
<line x1="480" y1="88" x2="480" y2="208" stroke="#E04A4A" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="492" y="150" dominant-baseline="central">24V</text>
<path d="M530 258 V406 H446" fill="none" stroke="#378ADD" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="544" y="330" dominant-baseline="central">ADC</text>
<line x1="341" y1="432" x2="341" y2="472" stroke="#378ADD" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
