<svg width="100%" viewBox="0 0 680 320" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Mega 進化 — 單點星狀接地拓樸</title>
<desc>馬達動力地與 ESP32 邏輯地僅在 PSU 負極一點交會（單點星接地）；CAN 匯流排地參考馬達側並經 CTM 隔離，避免馬達大電流回流進入訊號地。</desc>
<style>
text{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
.t,.th{fill:#2C2C2A;font-weight:500;font-size:14px}
.ts{fill:#5F5E5A;font-weight:400;font-size:12px}
.c-red rect{fill:#FCEBEB;stroke:#993C1D}.c-red .t,.c-red .th{fill:#4A1B0C}.c-red .ts{fill:#712B13}
.c-amber rect{fill:#FAEEDA;stroke:#854F0B}.c-amber .t,.c-amber .th{fill:#412402}.c-amber .ts{fill:#633806}
.c-blue rect{fill:#E6F1FB;stroke:#185FA5}.c-blue .t,.c-blue .th{fill:#042C53}.c-blue .ts{fill:#0C447C}
.c-green rect{fill:#EAF3DE;stroke:#3B6D11}.c-green .t,.c-green .th{fill:#173404}.c-green .ts{fill:#27500A}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="320" fill="#ffffff"/>

<rect x="16" y="24" width="210" height="276" rx="10" fill="none" stroke="#888780" stroke-width="1.5" stroke-dasharray="5 4"/>
<text class="ts" x="121" y="40" text-anchor="middle" dominant-baseline="central">馬達 / 匯流排接地域</text>
<rect x="454" y="24" width="210" height="276" rx="10" fill="none" stroke="#888780" stroke-width="1.5" stroke-dasharray="5 4"/>
<text class="ts" x="559" y="40" text-anchor="middle" dominant-baseline="central">邏輯接地域</text>

<g class="c-red"><rect x="36" y="56" width="170" height="52" rx="8" stroke-width="0.5"/><text class="th" x="121" y="78" text-anchor="middle" dominant-baseline="central">馬達動力地</text><text class="ts" x="121" y="96" text-anchor="middle" dominant-baseline="central">大電流回路</text></g>
<g class="c-green"><rect x="36" y="212" width="170" height="52" rx="8" stroke-width="0.5"/><text class="th" x="121" y="234" text-anchor="middle" dominant-baseline="central">CAN 匯流排地</text><text class="ts" x="121" y="252" text-anchor="middle" dominant-baseline="central">馬達側參考</text></g>
<g class="c-blue"><rect x="474" y="56" width="170" height="52" rx="8" stroke-width="0.5"/><text class="th" x="559" y="78" text-anchor="middle" dominant-baseline="central">ESP32 邏輯地</text><text class="ts" x="559" y="96" text-anchor="middle" dominant-baseline="central">MCU / 感測 / I²C</text></g>
<g class="c-amber"><rect x="474" y="212" width="170" height="52" rx="8" stroke-width="0.5"/><text class="th" x="559" y="234" text-anchor="middle" dominant-baseline="central">Buck / UPS 地</text><text class="ts" x="559" y="252" text-anchor="middle" dominant-baseline="central">5V 電源域</text></g>

<g class="c-amber"><rect x="270" y="150" width="140" height="66" rx="8" stroke-width="0.5"/><text class="th" x="340" y="176" text-anchor="middle" dominant-baseline="central">單點星接地</text><text class="ts" x="340" y="196" text-anchor="middle" dominant-baseline="central">PSU 負極</text></g>

<path d="M206 82 H240 V178 H270" fill="none" stroke="#5F5E5A" stroke-width="3" marker-end="url(#arrow)"/>
<path d="M474 82 H440 V178 H410" fill="none" stroke="#5F5E5A" stroke-width="3" marker-end="url(#arrow)"/>
<path d="M474 238 H440 V190 H410" fill="none" stroke="#5F5E5A" stroke-width="3" marker-end="url(#arrow)"/>
<path d="M121 212 V108" fill="none" stroke="#5F5E5A" stroke-width="3" marker-end="url(#arrow)"/>
<text class="ts" x="131" y="160" dominant-baseline="central">馬達側共地</text>

<text class="ts" x="340" y="286" text-anchor="middle" dominant-baseline="central">星點＝馬達地與邏輯地唯一交會點</text>
</svg>
