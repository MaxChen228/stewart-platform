<svg width="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Mega 進化 — 隔離式 CAN 鏈與 SERVO42ES 菊鏈拓樸</title>
<desc>ESP32-S3 的 TWAI 經 CTM1051M 隔離收發器輸出 CANH/CANL；SERVO42ES 每顆內建兩組並聯 CAN，直接 in/out 菊鏈成線性匯流排，兩端各一顆 120 歐姆終端，六顆馬達位址 0x01 至 0x06。</desc>
<style>
text{font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
.t,.th{fill:#2C2C2A;font-weight:500;font-size:14px}
.ts{fill:#5F5E5A;font-weight:400;font-size:12px}
.c-blue rect{fill:#E6F1FB;stroke:#185FA5}.c-blue .t,.c-blue .th{fill:#042C53}.c-blue .ts{fill:#0C447C}
.c-teal rect{fill:#E1F5EE;stroke:#0F6E56}.c-teal .t,.c-teal .th{fill:#04342C}.c-teal .ts{fill:#085041}
.c-gray rect{fill:#F1EFE8;stroke:#5F5E5A}.c-gray .t,.c-gray .th{fill:#2C2C2A}.c-gray .ts{fill:#444441}
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<rect x="0" y="0" width="680" height="340" fill="#ffffff"/>

<rect x="470" y="9" width="14" height="11" fill="#639922"/><text class="ts" x="489" y="15" dominant-baseline="central">CANH</text>
<rect x="556" y="9" width="14" height="11" fill="#3B6D11"/><text class="ts" x="575" y="15" dominant-baseline="central">CANL</text>

<g class="c-blue"><rect x="24" y="48" width="160" height="84" rx="8" stroke-width="0.5"/>
<text class="th" x="104" y="70" text-anchor="middle" dominant-baseline="central">ESP32-S3</text>
<text class="ts" x="104" y="88" text-anchor="middle" dominant-baseline="central">TWAI 控制器</text>
<text class="ts" x="174" y="112" text-anchor="end" dominant-baseline="central">G5 → TXD</text>
<text class="ts" x="174" y="128" text-anchor="end" dominant-baseline="central">G4 ← RXD</text>
</g>

<g class="c-teal"><rect x="236" y="48" width="180" height="84" rx="8" stroke-width="0.5"/>
<text class="th" x="326" y="68" text-anchor="middle" dominant-baseline="central">CTM1051M</text>
<text class="ts" x="326" y="86" text-anchor="middle" dominant-baseline="central">隔離 CAN 收發器</text>
<text class="ts" x="246" y="112" dominant-baseline="central">TXD/RXD</text>
<text class="ts" x="406" y="112" text-anchor="end" dominant-baseline="central">CANH/CANL</text>
</g>
<line x1="326" y1="94" x2="326" y2="130" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 3"/>

<g class="c-gray"><rect x="24" y="152" width="160" height="30" rx="8" stroke-width="0.5"/><text class="ts" x="104" y="167" text-anchor="middle" dominant-baseline="central">USB-C / WiFi → host</text></g>

<line x1="104" y1="132" x2="104" y2="152" stroke="#378ADD" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="184" y1="112" x2="236" y2="112" stroke="#378ADD" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="236" y1="128" x2="184" y2="128" stroke="#378ADD" stroke-width="2" marker-end="url(#arrow)"/>
<text class="ts" x="326" y="150" text-anchor="middle" dominant-baseline="central">CTM 隔離障壁（斷地迴路）</text>

<line x1="240" y1="212" x2="660" y2="212" stroke="#639922" stroke-width="3"/>
<line x1="240" y1="228" x2="660" y2="228" stroke="#3B6D11" stroke-width="3"/>

<line x1="270" y1="132" x2="270" y2="212" stroke="#639922" stroke-width="2"/>
<line x1="290" y1="132" x2="290" y2="228" stroke="#3B6D11" stroke-width="2"/>
<circle cx="270" cy="212" r="2.5" fill="#639922"/>
<circle cx="290" cy="228" r="2.5" fill="#3B6D11"/>

<line x1="240" y1="212" x2="240" y2="228" stroke="#888780" stroke-width="2"/>
<text class="ts" x="240" y="200" text-anchor="middle" dominant-baseline="central">120Ω</text>
<line x1="660" y1="212" x2="660" y2="228" stroke="#888780" stroke-width="2"/>
<text class="ts" x="660" y="200" text-anchor="middle" dominant-baseline="central">120Ω</text>

<g class="c-gray"><rect x="299" y="252" width="42" height="46" rx="8" stroke-width="0.5"/><text class="th" x="320" y="270" text-anchor="middle" dominant-baseline="central">M1</text><text class="ts" x="320" y="286" text-anchor="middle" dominant-baseline="central">0x01</text></g>
<line x1="320" y1="228" x2="320" y2="252" stroke="#3B6D11" stroke-width="2"/><circle cx="320" cy="228" r="2.5" fill="#3B6D11"/>
<g class="c-gray"><rect x="361" y="252" width="42" height="46" rx="8" stroke-width="0.5"/><text class="th" x="382" y="270" text-anchor="middle" dominant-baseline="central">M2</text><text class="ts" x="382" y="286" text-anchor="middle" dominant-baseline="central">0x02</text></g>
<line x1="382" y1="228" x2="382" y2="252" stroke="#3B6D11" stroke-width="2"/><circle cx="382" cy="228" r="2.5" fill="#3B6D11"/>
<g class="c-gray"><rect x="423" y="252" width="42" height="46" rx="8" stroke-width="0.5"/><text class="th" x="444" y="270" text-anchor="middle" dominant-baseline="central">M3</text><text class="ts" x="444" y="286" text-anchor="middle" dominant-baseline="central">0x03</text></g>
<line x1="444" y1="228" x2="444" y2="252" stroke="#3B6D11" stroke-width="2"/><circle cx="444" cy="228" r="2.5" fill="#3B6D11"/>
<g class="c-gray"><rect x="485" y="252" width="42" height="46" rx="8" stroke-width="0.5"/><text class="th" x="506" y="270" text-anchor="middle" dominant-baseline="central">M4</text><text class="ts" x="506" y="286" text-anchor="middle" dominant-baseline="central">0x04</text></g>
<line x1="506" y1="228" x2="506" y2="252" stroke="#3B6D11" stroke-width="2"/><circle cx="506" cy="228" r="2.5" fill="#3B6D11"/>
<g class="c-gray"><rect x="547" y="252" width="42" height="46" rx="8" stroke-width="0.5"/><text class="th" x="568" y="270" text-anchor="middle" dominant-baseline="central">M5</text><text class="ts" x="568" y="286" text-anchor="middle" dominant-baseline="central">0x05</text></g>
<line x1="568" y1="228" x2="568" y2="252" stroke="#3B6D11" stroke-width="2"/><circle cx="568" cy="228" r="2.5" fill="#3B6D11"/>
<g class="c-gray"><rect x="609" y="252" width="42" height="46" rx="8" stroke-width="0.5"/><text class="th" x="630" y="270" text-anchor="middle" dominant-baseline="central">M6</text><text class="ts" x="630" y="286" text-anchor="middle" dominant-baseline="central">0x06</text></g>
<line x1="630" y1="228" x2="630" y2="252" stroke="#3B6D11" stroke-width="2"/><circle cx="630" cy="228" r="2.5" fill="#3B6D11"/>

<text class="ts" x="240" y="318" dominant-baseline="central">SERVO42ES 雙組並聯 CAN → 馬達直接 in/out 菊鏈，免外部 busbar；兩端各 120Ω</text>
</svg>
