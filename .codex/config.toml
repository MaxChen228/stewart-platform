# Project-scoped Codex config for stewart-platform.
# Codex loads this only when the project is trusted.

# Keep the legacy Claude entry point discoverable if AGENTS.md is absent in a
# nested working directory. Root AGENTS.md remains the primary instruction file.
project_doc_fallback_filenames = ["CLAUDE.md"]
project_doc_max_bytes = 65536

[agents]
# Keep subagent fan-out bounded for hardware/control work.
max_threads = 4
max_depth = 1
job_max_runtime_seconds = 1800
